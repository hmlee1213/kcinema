<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 뭐 볼까?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<!-- Google Analytics (GA4) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXXXXX');
  function trackSearch(query, cinemas, resultCount) {
    gtag('event', 'search', { search_term: query, cinema_filter: cinemas.join(','), result_count: resultCount });
  }
  function trackCinemaClick(cinemaName) {
    gtag('event', 'cinema_click', { cinema_name: cinemaName });
  }
  function trackTabSwitch(tabName) {
    gtag('event', 'tab_switch', { tab_name: tabName });
  }
</script>
<style>
:root {
  --bg:#F5F4F0;--surface:#fff;--surface2:#EDECE8;--border:#DDDBD4;--border2:#CDD2DB;
  --text:#1A1916;--text-muted:#7A7870;--text-sub:#B0AEA6;
  --green:#2D5A1B;--green-light:#EEF4EA;
  --chip-bg:#666666;
  --radius:10px;--shadow:0 1px 4px rgba(0,0,0,.07);--shadow-md:0 6px 20px rgba(0,0,0,.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;}

/* ── 헤더 ── */
header{background:var(--text);color:#fff;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:16px;height:52px;}
.logo{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;letter-spacing:.01em;color:#fff;white-space:nowrap;flex-shrink:0;}
.header-stats{display:flex;gap:16px;margin-left:auto;font-size:11px;color:rgba(255,255,255,.7);}
.header-stats strong{color:#fff;font-weight:700;}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.2;}
.stat-item .stat-label{font-size:11px;color:rgba(255,255,255,.7);}
.stat-item strong{font-size:11px;font-weight:700;color:#fff;}
.header-refresh{font-size:11px;font-weight:600;font-family:inherit;padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.7);cursor:pointer;transition:all .12s;}
.header-refresh:hover{background:rgba(255,255,255,.1);color:#fff;}

/* ── 탭 바 ── */
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:52px;z-index:99;}
.tab-bar-inner{max-width:1280px;margin:0 auto;display:flex;overflow-x:auto;}
.tab{padding:12px 16px;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;user-select:none;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--green);border-bottom-color:var(--green);}
.tab-badge{display:inline-block;background:var(--surface2);color:var(--text-muted);font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px;margin-left:4px;}
.tab.active .tab-badge{background:var(--green-light);color:var(--green);}

/* ── 메인 ── */
.main{max-width:1280px;margin:0 auto;padding:20px 24px 60px;}

/* ── 공통 섹션 헤더 ── */
.section-header{margin-bottom:16px;}
.quick-title-row{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;}
.section-title{font-family:'DM Serif Display',serif;font-size:20px;}
.section-sub{font-size:12px;color:var(--text-muted);}
.quick-ctrl-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.day-tabs{display:flex;gap:6px;}
.day-tab{font-size:12px;font-weight:600;font-family:inherit;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .12s;}
.day-tab:hover{border-color:var(--text);color:var(--text);}
.day-tab.active{background:var(--text);border-color:var(--text);color:#fff;}
.quick-sort-btns{display:flex;gap:5px;margin-left:auto;}
.quick-sort-btn{font-size:11px;font-weight:600;font-family:inherit;padding:4px 11px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .12s;white-space:nowrap;}
.quick-sort-btn:hover{border-color:var(--text);color:var(--text);}
.quick-sort-btn.active{background:var(--text);border-color:var(--text);color:#fff;}
.quick-filter-btn{font-size:11px;font-weight:600;font-family:inherit;padding:4px 11px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .12s;white-space:nowrap;}
.quick-filter-btn:hover{border-color:var(--text);color:var(--text);}
.quick-filter-btn.active{background:var(--text);border-color:var(--text);color:#fff;}
.sticker{display:inline-block;font-size:9px;font-weight:700;background:#555;color:#fff;padding:1px 4px;border-radius:3px;white-space:nowrap;vertical-align:middle;margin-left:4px;letter-spacing:.02em;}

/* ── 로딩/빈상태 ── */
.loading{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:13px;}
.spinner{width:26px;height:26px;border:2.5px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px;}

/* ── 맨위로 ── */
.scroll-top-btn{position:fixed;bottom:28px;right:28px;width:42px;height:42px;border-radius:50%;background:#111827;color:#fff;border:none;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:200;line-height:1;}
.scroll-top-btn.visible{opacity:1;pointer-events:auto;}
.scroll-top-btn:hover{background:#374151;transform:translateY(-2px);}

/* ══════════════════════════════════
   ① 빠른 조회
══════════════════════════════════ */
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}
.quick-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .18s;display:flex;flex-direction:row;overflow:hidden;align-items:stretch;}
.quick-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.qc-poster{width:60px;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;align-self:stretch;}
.qc-poster img{width:100%;height:100%;object-fit:cover;}
.qc-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;padding:10px 12px 12px;}
.qc-title{font-size:13px;font-weight:700;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.qc-title a{color:inherit;text-decoration:none;border-bottom:1.5px solid var(--green);}
.qc-title a:hover{color:var(--green);}
.qc-venue{font-size:11px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:4px;overflow:hidden;flex-wrap:wrap;}
.venue-dot{width:6px;height:6px;border-radius:50%;background:var(--text);flex-shrink:0;}
.venue-dot.free{background:var(--green);}
.venue-sep{color:var(--border2);font-size:11px;}
.qc-times{display:flex;flex-wrap:wrap;gap:3px 8px;align-items:center;}
.qc-date{font-size:11px;font-weight:600;color:var(--text-muted);display:flex;align-items:center;gap:4px;}
.time-chip{display:inline-flex;align-items:center;background:none;color:var(--text);border-radius:0;padding:0;font-size:14px;font-weight:700;white-space:nowrap;gap:0;}
.time-dash{color:var(--text-muted);font-weight:600;margin:0 2px;font-size:14px;}
.time-chip .sticker{background:#555;color:#fff;margin-left:5px;}

/* ══════════════════════════════════
   팝업
══════════════════════════════════ */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px;}
.popup-overlay.open{display:flex;}
.popup-sort-btn{font-size:11px;font-weight:600;font-family:inherit;padding:4px 12px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .12s;}
.popup-sort-btn.active{background:var(--text);border-color:var(--text);color:#fff;}
.popup{background:var(--surface);border-radius:14px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;position:relative;animation:popIn .16s ease;}
@keyframes popIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.popup-close{position:absolute;top:12px;right:14px;width:26px;height:26px;border-radius:50%;border:none;background:var(--surface2);color:var(--text-muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1;}
.popup-close:hover{background:var(--text);color:#fff;}
.popup-top{display:flex;gap:14px;padding:18px 18px 14px;}
.popup-poster{width:70px;height:98px;border-radius:6px;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;}
.popup-poster img{width:100%;height:100%;object-fit:cover;}
.popup-info{flex:1;min-width:0;padding-right:20px;}
.popup-title{font-size:15px;font-weight:800;line-height:1.3;margin-bottom:7px;}
.popup-meta{font-size:12px;color:var(--text-muted);line-height:2.}
.popup-meta span{color:var(--text);font-weight:600;}
.popup-divider{height:1px;background:var(--border);margin:0 18px;}
.popup-schedules{padding:12px 18px 18px;}
.popup-sched-title{font-size:10px;font-weight:700;color:var(--text-sub);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;}
.sched-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;flex-wrap:wrap;}
.sched-row:last-child{border-bottom:none;}
.sched-cinema{font-weight:600;flex:1;}
.sched-time-chip{background:var(--chip-bg);color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;white-space:nowrap;}

/* ══════════════════════════════════
   ② 극장별
══════════════════════════════════ */
.filter-ctrl-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
/* 극장 칩: 6열 균등 그리드 */
.cinema-chips-wrap{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:5px;flex:1;min-width:0;}
/* 12개 극장 → PC: 6열×2행, 모바일: 2열×6행 */
.cinema-chip-btn{font-size:12px;font-weight:600;font-family:inherit;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:all .12s;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none;}
.cinema-chip-btn.off{border-color:var(--border);background:var(--surface);color:var(--text);}
.cinema-chip-btn:not(.off){border-color:#444;background:#444;color:#fff;}
.cinema-chip-btn.off:hover{border-color:var(--text);}
.ctrl-btns{display:flex;gap:6px;flex-shrink:0;}
.ctrl-btn{font-size:11px;font-weight:700;font-family:inherit;padding:4px 12px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .12s;}
.ctrl-btn:hover{background:var(--text);border-color:var(--text);color:#fff;}


.cinema-grid{display:grid;grid-template-columns:1fr;gap:8px;}
.cinema-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.cinema-group-header{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface2);}
.cinema-group-name{font-size:13px;font-weight:700;flex:1;display:flex;align-items:center;gap:6px;}
.cinema-group-meta{font-size:12px;color:var(--text-muted);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
/* 극장 카드 내부 2열 그리드 — 헤더 배경색과 동일한 구분선 */
.cinema-rows-2col{
  display:grid;
  grid-template-columns:1fr;
  column-gap:0;
}
.cinema-rows-2col .c-row{border-bottom:1px solid var(--surface2);}
.cinema-rows-2col .c-row:nth-child(odd){border-right:none;}
.cinema-rows-2col .c-row:nth-last-child(-n+2){border-bottom:none;}
/* 무료 태그 */
.free-tag{font-size:10px;font-weight:700;background:#D1FAE5;color:#065F46;padding:1px 6px;border-radius:3px;}
.chip-loc{font-size:9px;font-weight:600;background:#E5E7EB;color:#6B7280;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;}
.chip-free{font-size:9px;font-weight:700;background:#D1FAE5;color:#065F46;padding:1px 5px;border-radius:3px;margin-left:3px;vertical-align:middle;}
.c-row{display:grid;grid-template-columns:80px 118px minmax(0,1fr);align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:14px;}
.c-row:last-child{border-bottom:none;}
.c-date{font-weight:600;color:var(--text);white-space:nowrap;}
.c-time{font-weight:600;color:var(--text);white-space:nowrap;}
.c-movie{font-weight:600;display:flex;align-items:flex-start;gap:4px;flex-wrap:wrap;word-break:keep-all;}
.c-movie a{color:var(--text);text-decoration:none;border-bottom:1.5px solid var(--green);word-break:keep-all;}
.c-movie a:hover{color:var(--green);}

/* ══════════════════════════════════
   ③ 영화별
══════════════════════════════════ */
.movie-search-bar{position:relative;margin-bottom:14px;}
.movie-search-bar input{width:100%;max-width:320px;padding:8px 12px 8px 32px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;color:var(--text);outline:none;background:var(--surface);}
.movie-search-bar input:focus{border-color:var(--green);}
.movie-search-bar::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;}
.movie-search-tab{font-size:13px;font-weight:600;font-family:inherit;padding:7px 16px;border:none;background:none;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .12s;}
.movie-search-tab.active{color:var(--green);border-bottom-color:var(--green);}
/* 영화별 정렬 버튼 */
.movie-sort-btn{font-size:11px;font-weight:600;font-family:inherit;padding:5px 12px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .12s;white-space:nowrap;}
.movie-sort-btn:hover{border-color:var(--text);color:var(--text);}
.movie-sort-btn.active{background:var(--text);border-color:var(--text);color:#fff;}
/* 관리자 추천 배지 */
.rec-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:800;color:#B45309;flex-shrink:0;letter-spacing:-.01em;}
.movie-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:8px;}
.mv-card{border:1.5px solid var(--border);border-radius:8px;padding:0;cursor:pointer;transition:border-color .12s,box-shadow .12s;background:var(--surface);position:relative;overflow:hidden;display:flex;flex-direction:column;}
.mv-card:hover{border-color:#2D5A1B;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.mv-card.has-rec{border-color:#F59E0B;}
.mv-poster{width:100%;aspect-ratio:3/4;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;flex-shrink:0;}
.mv-poster img{width:100%;height:100%;object-fit:cover;}
.mv-info{padding:7px 8px 9px;flex:1;display:flex;flex-direction:column;gap:3px;}
.mv-title{font-size:15px;font-weight:800;line-height:1.3;color:var(--text);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.mv-meta{font-size:13px;color:var(--text-muted);line-height:1.4;margin-top:2px;}
.mv-count{font-size:10px;font-weight:700;background:var(--surface2);color:var(--text-muted);padding:1px 5px;border-radius:4px;display:inline-block;margin-top:2px;}
.mv-rec-badge{position:absolute;top:4px;right:4px;font-size:10px;font-weight:800;color:#B45309;background:rgba(255,255,255,.9);border-radius:3px;padding:0 3px;line-height:1.6;}
.mv-wish-btn{position:absolute;bottom:6px;right:6px;background:none;border:none;cursor:pointer;font-size:14px;color:#ccc;-webkit-text-stroke:.4px #bbb;line-height:1;padding:1px;transition:color .1s;}
.mv-wish-btn:hover,.mv-wish-btn.on{color:#e05;-webkit-text-stroke:.4px #c00;}
.movie-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.movie-group-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;transition:background .12s;}
.movie-group-header:hover{background:#FAFAF8;}
.movie-thumb{width:32px;height:44px;background:var(--surface2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;}
.movie-thumb img{width:100%;height:100%;object-fit:cover;}
.movie-group-info{flex:1;min-width:0;}
.movie-group-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.movie-group-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}
.movie-group-count{font-size:11px;font-weight:700;background:var(--surface2);padding:2px 7px;border-radius:10px;color:var(--text-muted);white-space:nowrap;flex-shrink:0;}
.movie-rows{display:none;border-top:1px solid var(--border);max-height:240px;overflow-y:auto;}
.movie-rows.open{display:block;}
/* 영화별 행: 극장정보 / 날짜 / 시간 */
.m-row{display:grid;grid-template-columns:1fr 68px 104px;align-items:center;gap:6px;padding:7px 14px;border-bottom:1px solid var(--border);font-size:12px;}
.m-row:last-child{border-bottom:none;}
.m-cinema-cell{display:flex;align-items:center;gap:5px;overflow:hidden;}
.m-cinema{font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.m-screen{color:var(--text-muted);white-space:nowrap;flex-shrink:0;}
.m-free{font-size:10px;font-weight:700;background:#D1FAE5;color:#065F46;padding:1px 5px;border-radius:3px;flex-shrink:0;}
.m-date{font-weight:600;color:var(--text);white-space:nowrap;}
.m-time{font-weight:600;color:var(--text);white-space:nowrap;display:flex;align-items:center;gap:0;}

/* ══════════════════════════════════
   ④ 상세 조회
══════════════════════════════════ */
.filter-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:14px;}
.filter-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:10px;}
.filter-row:last-child{margin-bottom:0;}
.filter-label{font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.filter-input{padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;color:var(--text);outline:none;background:var(--surface);}
.filter-input:focus{border-color:var(--green);}
input[type="date"].filter-input{border:none;background:#fff;color:var(--text);padding:7px 4px;font-size:13px;cursor:pointer;}
input[type="date"].filter-input:focus{outline:none;}
.shortcut{font-size:11px;font-weight:600;font-family:inherit;padding:4px 10px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .12s;}
.shortcut.active,.shortcut:hover{background:var(--text);border-color:var(--text);color:#fff;}
.detail-chip{font-size:11px;font-weight:600;font-family:inherit;padding:5px 4px;border-radius:6px;border:1.5px solid var(--text);background:var(--surface);color:var(--text);cursor:pointer;user-select:none;transition:all .12s;text-align:center;white-space:normal;word-break:keep-all;line-height:1.3;}
.detail-chip.off{border-color:var(--border);color:var(--text-sub);text-decoration:line-through;}
.btn-search{padding:8px 22px;background:var(--text);color:#fff;border:none;border-radius:7px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .12s;}
.btn-search:hover{opacity:.8;}
.btn-excel{padding:8px 16px;background:var(--surface);color:var(--text);border:1.5px solid var(--border2);border-radius:7px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;}
.btn-excel:hover{border-color:var(--text);}
.btn-reset{padding:8px 14px;background:var(--surface);color:var(--text-muted);border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;}
.btn-reset:hover{color:var(--text);border-color:var(--text);}
.filter-note{font-size:11px;color:var(--green);font-weight:600;}

.result-meta{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.result-count{font-size:13px;color:var(--text-muted);}
.result-count strong{color:var(--text);font-weight:700;}
.view-toggle{display:flex;background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;overflow:hidden;margin-left:auto;}
.v-btn{padding:5px 13px;font-size:11px;font-weight:600;font-family:inherit;background:none;border:none;color:var(--text-muted);cursor:pointer;transition:all .1s;}
.v-btn.active{background:var(--surface);color:var(--text);}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;}
thead{background:var(--surface2);}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}
th:hover{color:var(--text);}
th.sort-asc::after{content:" ↑";font-size:9px;}
th.sort-desc::after{content:" ↓";font-size:9px;}
.sort-reset-th{padding:0 8px;}
.sort-reset-btn{font-size:10px;font-family:inherit;font-weight:600;padding:3px 7px;border-radius:4px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);}
.sort-reset-btn:hover{background:var(--text);color:#fff;border-color:var(--text);}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFAF8;}

/* 테이블 내 요소 — 전부 흰바탕 검정글씨 */
.dt-cinema{font-weight:700;font-size:13px;color:var(--text);}
.dt-screen{font-size:12px;color:var(--text-muted);margin-left:4px;}
.dt-date{font-size:12px;font-weight:600;color:var(--text);}
.dt-dow{display:inline-block;font-size:10px;font-weight:700;background:#111827;color:#fff;padding:1px 4px;border-radius:3px;margin-left:3px;vertical-align:middle;}
.dt-dow.sat,.dt-dow.sun{background:#990000;}
.dt-time{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;}
.movie-link{color:var(--text);text-decoration:none;font-weight:600;border-bottom:1.5px solid var(--green);}
.movie-link:hover{color:var(--green);}

/* 카드 뷰 */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;transition:box-shadow .15s,transform .15s;display:flex;flex-direction:column;gap:7px;}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.card-title{font-weight:700;font-size:15px;line-height:1.35;color:var(--text);}
.card-time{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:13px;font-weight:600;color:var(--text);}
.card-cinema-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.card-cinema-badge{font-size:12px;font-weight:700;background:var(--text);color:#fff;padding:2px 8px;border-radius:4px;text-decoration:none;white-space:nowrap;}
.card-cinema-badge:hover{opacity:.8;}
.screen-tag{background:#E5E7EB;color:#111;font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;}

.rec-empty-icon{font-size:40px;margin-bottom:12px;}

/* ══════════════════════════════════
   탐색 탭
══════════════════════════════════ */
.condition-bar{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow);}
.cond-block{border-bottom:1px solid var(--border);}
.cond-block:last-child{border-bottom:none;}
.cond-row{display:flex;align-items:stretch;}
.cond-label{width:76px;padding:12px 12px;font-size:13px;font-weight:800;color:var(--text);letter-spacing:.02em;flex-shrink:0;border-right:1px solid var(--border);display:flex;align-items:center;}
.cond-body{flex:1;padding:9px 12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.cond-sub{padding:0 12px 10px 88px;display:none;flex-wrap:wrap;gap:6px;align-items:center;}
.cond-sub.open{display:flex;}
.cond-sub-label{font-size:10px;font-weight:700;color:var(--text-sub);letter-spacing:.04em;white-space:nowrap;}
.cond-sub-label--section{font-size:13px;font-weight:800;color:var(--text);letter-spacing:0;background:var(--surface2);padding:3px 8px;border-radius:6px;}
.cond-sep{width:1px;height:16px;background:var(--border);flex-shrink:0;margin:0 2px;}
.ex-chip{font-size:12px;font-weight:600;font-family:inherit;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .12s;white-space:nowrap;user-select:none;}
.ex-chip:hover{border-color:var(--text);color:var(--text);}
.ex-chip.active{background:var(--text);border-color:var(--text);color:#fff;}
.ex-date{font-size:12px;font-weight:600;font-family:inherit;padding:5px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);outline:none;}
.ex-date:focus{border-color:var(--text);}
.ex-select{font-size:12px;font-weight:600;font-family:inherit;padding:5px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);outline:none;cursor:pointer;}
.ex-select:focus{border-color:var(--text);}
.ex-search{font-size:13px;font-family:inherit;padding:5px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);outline:none;min-width:160px;flex:1;max-width:320px;}
.ex-search:focus{border-color:var(--text);}
.ex-search::placeholder{color:var(--text-sub);}
.ex-cinema-chip{font-size:11px;font-weight:600;font-family:inherit;padding:4px 10px;border-radius:14px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .12s;white-space:nowrap;}
.ex-cinema-chip:hover{border-color:var(--text);color:var(--text);}
.ex-cinema-chip.active{background:var(--green);border-color:var(--green);color:#fff;}
.ex-cinema-chip.active .free-badge{color:rgba(255,255,255,.8);}
.explore-cinema-chips{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;}
.free-badge{font-size:9px;font-weight:700;color:var(--green);margin-left:3px;}
.result-header-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap;}

.result-title-text{font-size:15px;font-weight:800;color:var(--text);}
.result-sub-text{font-size:13px;font-weight:600;color:var(--text-muted);}
.result-count-text{font-size:12px;font-weight:600;color:var(--text-muted);}
.explore-grid{display:grid;gap:8px;}
@media(max-width:700px){
  .cond-label{width:60px;font-size:11px;font-weight:800;color:var(--text);padding:10px 8px;}
  .cond-sub{padding-left:72px;}
  .explore-grid{grid-template-columns:repeat(2,1fr) !important;}
}

/* ══════════════════════════════════
   찜 / 내 일정
══════════════════════════════════ */
.heart-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;color:#999;-webkit-text-stroke:.5px #888;transition:all .12s;flex-shrink:0;}
.heart-btn:hover{color:#e05;-webkit-text-stroke:.5px #c00;transform:scale(1.15);}
.heart-btn.on{color:#e05;-webkit-text-stroke:.5px #c00;}
/* 상영찜 북마크 아이콘 */
.sched-wish-btn{background:none;border:none;cursor:pointer;font-size:11px;padding:0 2px;line-height:1;color:#ccc;transition:color .08s,transform .08s;flex-shrink:0;font-family:inherit;}
.sched-wish-btn:hover{color:#555;transform:scale(1.2);}
.sched-wish-btn.on{color:#111;}
.wish-subtabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;}
.wish-subtab{font-size:13px;font-weight:600;font-family:inherit;padding:8px 20px;border:none;background:none;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;}
.wish-subtab.active{color:var(--green);border-bottom-color:var(--green);}
.wish-count-badge{display:inline-block;background:var(--surface2);color:var(--text-muted);font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px;margin-left:4px;}
.wish-subtab.active .wish-count-badge{background:var(--green-light);color:var(--green);}
/* ── 관심목록 2단 레이아웃 ── */
.wish-dual{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
.wish-col{}
.wish-col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--border);}
.wish-col-title{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.01em;display:flex;align-items:center;gap:6px;}
@media(max-width:700px){
  .wish-dual{grid-template-columns:1fr;}
}

.wish-empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
.wish-empty-icon{font-size:36px;margin-bottom:10px;}
.wish-date-group{margin-bottom:14px;}
.wish-date-label{font-size:12px;font-weight:700;color:var(--text-muted);padding:6px 0 6px;letter-spacing:.03em;border-bottom:1px solid var(--border);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.wish-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:5px;}
.wish-row.past{opacity:.45;}
.wish-row-info{flex:1;min-width:0;}
.wish-row-movie{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wish-row-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}
.wish-row-time{font-size:12px;font-weight:700;background:var(--chip-bg);color:#fff;padding:2px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0;}
.wish-remove{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-sub);padding:2px 4px;flex-shrink:0;}
.wish-remove:hover{color:#e05;}
.wish-movie-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:5px;}
.wish-movie-thumb{width:36px;height:50px;border-radius:4px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0;}
.wish-movie-thumb img{width:100%;height:100%;object-fit:cover;}
.wish-movie-info{flex:1;min-width:0;}
.wish-movie-scheds{display:flex;flex-wrap:wrap;gap:4px;padding:2px 0 4px;}
.wish-sched-chip{font-size:11px;font-weight:600;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 7px;white-space:nowrap;}

.wish-movie-title{font-size:13px;font-weight:700;}
.wish-movie-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}
.wish-clear-btn{font-size:11px;font-family:inherit;font-weight:600;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;margin-left:auto;}
.wish-clear-btn:hover{border-color:#e05;color:#e05;}
.movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;}

@media(max-width:700px){
  .tab-bar{padding:0;}
.tab{flex:1 1 20%;text-align:center;padding:9px 4px;font-size:11px;border-bottom:2px solid transparent;box-sizing:border-box;}
  .cinema-chips-wrap{grid-template-columns:repeat(2,1fr);}
  .rec-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .quick-grid{grid-template-columns:repeat(2,1fr) !important;}
  .cinema-grid{grid-template-columns:1fr;}
  .movie-grid{grid-template-columns:repeat(2,1fr);}
  .cinema-rows-2col{grid-template-columns:1fr;}
  .cinema-rows-2col .c-row:nth-child(odd){border-right:none;}
  .cinema-rows-2col .c-row:nth-last-child(-n+2){border-bottom:1px solid var(--surface2);}
  .cinema-rows-2col .c-row:last-child{border-bottom:none;}
  .c-row{grid-template-columns:64px 94px 1fr;}
  .m-row{grid-template-columns:1fr 60px 96px;}
  .cards-grid{grid-template-columns:1fr;}
  .main{padding:16px 14px 40px;}
}
@media(max-width:480px){
  .explore-cinema-chips{grid-template-columns:repeat(3,1fr);}
  .movie-card-grid{grid-template-columns:repeat(3,1fr);gap:7px;}
  .mv-poster{aspect-ratio:2/3;}
  .mv-info{padding:5px 6px 7px;}
  .mv-title{font-size:13px;}
  .mv-meta{font-size:12px;}
  .mv-count{font-size:11px;}
  .tab{padding:10px 12px;font-size:12px;}
  .day-tabs{gap:4px;}
  .day-tab{padding:4px 10px;font-size:11px;}
  .c-row{grid-template-columns:58px 86px 1fr;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">오늘 뭐 볼까?</div>
    <div class="header-stats">
      <div class="stat-item"><span class="stat-label">극장</span><strong id="statCinemas">—</strong></div>
      <div class="stat-item"><span class="stat-label">상영</span><strong id="statTotal">—</strong></div>
      <div class="stat-item"><span class="stat-label">영화</span><strong id="statMovies">—</strong></div>
    </div>
    <button class="header-refresh" id="refreshBtn" onclick="refreshData()">↻ 새로고침</button>
  </div>
</header>

<div class="tab-bar">
  <div class="tab-bar-inner">
    <div class="tab active" id="tab-btn-explore" onclick="switchTab('explore')">탐색</div>
    <div class="tab" id="tab-btn-cinema" onclick="switchTab('cinema')">극장별</div>
    <div class="tab" id="tab-btn-movie" onclick="switchTab('movie')">영화별 <span class="tab-badge" id="movie-count-badge">—</span></div>
    <div class="tab" id="tab-btn-wish" onclick="switchTab('wish')">관심목록 <span class="tab-badge" id="wish-count-badge">0</span></div>
  </div>
</div>

<div class="main">

  <!-- ① 탐색 -->
  <div id="tab-explore">

    <!-- 조건 바 -->
    <div class="condition-bar">

      <!-- 언제? -->
      <div class="cond-block">
        <div class="cond-row">
          <div class="cond-label">언제?</div>
          <div class="cond-body">
            <button class="ex-chip active" id="directSetBtn" onclick="setDirectMode()">직접 설정</button>
            <div class="cond-sep"></div>
            <button class="ex-chip" data-mode="today" onclick="setExploreDate(this,'today')">오늘</button>
            <button class="ex-chip" data-mode="tomorrow" onclick="setExploreDate(this,'tomorrow')">내일</button>
            <button class="ex-chip" data-mode="saturday" onclick="setExploreDate(this,'saturday')">토</button>
            <button class="ex-chip" data-mode="sunday" onclick="setExploreDate(this,'sunday')">일</button>
            <div class="cond-sep"></div>
            <button class="ex-chip" id="rangeToggleBtn" onclick="setRangeMode()">기간 선택</button>
          </div>
        </div>
        <!-- 직접 설정 패널: 날짜 1개 + 시간대, 기본 오늘 17~23시 -->
        <div class="cond-sub open" id="directSub">
          <span class="cond-sub-label cond-sub-label--section">날짜</span>
          <input class="ex-date" type="date" id="exploreDate" onchange="loadExploreData()">
          <div class="cond-sep"></div>
          <span class="cond-sub-label cond-sub-label--section">시간대</span>
          <button class="ex-chip" id="timeAllBtn" onclick="setTimeAll(this)">전체</button>
          <select class="ex-select" id="exploreTimeFrom" onchange="onTimeSelectChange()">
            <option value="00">00시~</option><option value="09">09시~</option>
            <option value="10">10시~</option><option value="11">11시~</option>
            <option value="12">12시~</option><option value="13">13시~</option>
            <option value="14">14시~</option><option value="15">15시~</option>
            <option value="16">16시~</option><option value="17" selected>17시~</option>
            <option value="18">18시~</option><option value="19">19시~</option>
            <option value="20">20시~</option><option value="21">21시~</option>
          </select>
          <span style="color:var(--text-sub);font-size:12px;">~</span>
          <select class="ex-select" id="exploreTimeTo" onchange="onTimeSelectChange()">
            <option value="23" selected>23시</option><option value="22">22시</option>
            <option value="21">21시</option><option value="20">20시</option>
            <option value="19">19시</option><option value="18">18시</option>
            <option value="17">17시</option><option value="16">16시</option>
            <option value="15">15시</option><option value="14">14시</option>
            <option value="13">13시</option><option value="12">12시</option>
          </select>
        </div>
        <!-- 기간 선택 패널: 날짜 from~to, 기본 전체 기간 -->
        <div class="cond-sub" id="rangeSub">
          <span class="cond-sub-label cond-sub-label--section">기간</span>
          <input class="ex-date" type="date" id="exploreDateFrom" onchange="loadExploreData()">
          <span style="color:var(--text-sub);font-size:12px;">~</span>
          <input class="ex-date" type="date" id="exploreDateTo" onchange="loadExploreData()">
          <span style="font-size:11px;color:var(--text-sub);margin-left:2px;">비워두면 전체 기간</span>
        </div>
      </div>

      <!-- 어디서? -->
      <div class="cond-block">
        <div class="cond-row">
          <div class="cond-label">어디서?</div>
          <div class="cond-body">
            <button class="ex-chip active" data-area="all" onclick="setExploreArea(this,'all')">전체</button>
            <button class="ex-chip" data-area="sinchon" onclick="setExploreArea(this,'sinchon')">신촌·이대</button>
            <button class="ex-chip" data-area="hongdae" onclick="setExploreArea(this,'hongdae')">홍대·상암</button>
            <button class="ex-chip" data-area="gwanghwa" onclick="setExploreArea(this,'gwanghwa')">광화문·종로</button>
            <button class="ex-chip" data-area="kondae" onclick="setExploreArea(this,'kondae')">건대·성수</button>
            <button class="ex-chip" data-area="north" onclick="setExploreArea(this,'north')">성북·노원</button>
            <button class="ex-chip" data-area="gangnam" onclick="setExploreArea(this,'gangnam')">강남</button>
            <div class="cond-sep"></div>
            <button class="ex-chip" id="cinemaDirectBtn" onclick="toggleCinemaDirect()">직접 선택</button>
          </div>
        </div>
        <div class="cond-sub" id="cinemaDirectSub">
          <div class="cond-sub-label">극장 선택</div>
          <div id="explorecinemaChips" class="explore-cinema-chips"></div>
        </div>
      </div>

      <!-- 어떤 거? -->
      <div class="cond-block">
        <div class="cond-row">
          <div class="cond-label">어떤 거?</div>
          <div class="cond-body">
            <input class="ex-search" id="exploreMovieSearch" placeholder="영화 제목 검색…" oninput="onExploreSearch(this.value)">
          </div>
        </div>
      </div>
    </div>

    <!-- 결과 헤더 -->
    <div class="result-header-row">
      <span class="result-title-text">볼 수 있는 영화</span>
      <span class="result-sub-text" id="exploreSub"></span>
      <span class="result-count-text" id="exploreCount"></span>
      <div style="margin-left:auto;display:flex;gap:5px;align-items:center;flex-wrap:wrap;">
        <button class="quick-sort-btn active" data-sort="time" onclick="setExploreSort(this,'time')">상영시작순</button>
        <button class="quick-sort-btn" data-sort="title" onclick="setExploreSort(this,'title')">제목순</button>
        <span style="width:1px;height:14px;background:var(--border);flex-shrink:0;"></span>
        <button class="quick-filter-btn" id="recFilterBtn" onclick="toggleExploreRecFilter(this)" title="추천 영화만 보기">★ 추천</button>
        <button class="quick-filter-btn" id="specialFilterBtn" onclick="toggleSpecialFilter(this)" title="GV·토크 등 특별회차만 보기">🎙 특별회차</button>
      </div>
    </div>

    <div id="explore-content"><div class="loading"><div class="spinner"></div>로딩 중…</div></div>

<script>
/* ══════════════════════════════════════
   유틸
══════════════════════════════════════ */
const DOW_KO = ["일","월","화","수","목","금","토"];
const FREE_CINEMAS = ["서울영화센터","한국영상자료원"];
const CINEMA_ORDER = [
  "KT&G상상마당시네마","KU시네마테크","더숲아트시네마","라이카시네마",
  "서울아트시네마","씨네큐브","아리랑시네센터","아트나인","아트하우스모모","에무시네마",
  "서울영화센터","한국영상자료원"
];
const CINEMA_LOC = {
  "KT&G상상마당시네마":"홍대","KU시네마테크":"건대","더숲아트시네마":"노원",
  "라이카시네마":"연희동","서울아트시네마":"서대문","씨네큐브":"광화문",
  "아리랑시네센터":"성북구","아트나인":"이수","아트하우스모모":"이대","에무시네마":"광화문",
  "서울영화센터":"충무로","한국영상자료원":"상암"
};

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function fmtKST(d){
  const kst = new Date(d.getTime() + 9*60*60*1000);
  return kst.toISOString().slice(0,10);
}

function today_kst(){ return fmtKST(new Date()); }

function splitDt(dt){
  if(!dt) return {date:"",mmdd:"",time:"",dow:"",dowIdx:-1};
  const date=dt.slice(0,10), time=dt.slice(11,16);
  const d=new Date(date+"T00:00:00");
  const dowIdx=d.getDay();
  return {date, mmdd:date.slice(5).replace("-","/"), time, dow:DOW_KO[dowIdx], dowIdx};
}

function renderDowBadge(dow, dowIdx){
  const cls = (dowIdx===0||dowIdx===6) ? "dt-dow sat" : "dt-dow";
  return `<span class="${cls}">${dow}</span>`;
}

function stickerHtml(program, showType){
  const tags = [];
  const src = ((program||"")+" "+(showType||"")).toLowerCase();
  if(src.includes("gv")||src.includes("감독")) tags.push("GV");
  else if(src.includes("토크")||src.includes("talk")) tags.push("토크");
  if(src.includes("굿즈")) tags.push("굿즈");
  return tags.map(t=>`<span class="sticker">${t}</span>`).join("");
}

/* ══════════════════════════════════════
   앱 상태
══════════════════════════════════════ */
let cinemaData = [];
let movieData  = [];
let recData    = [];
let cinemaChipState = {};
let statsCache = null;

/* ══════════════════════════════════════
   초기화
══════════════════════════════════════ */
async function init(){
  await loadStats();
  initCinemaTabChips();
  initExploreCinemaChips();
  // 직접 설정 날짜 기본값: 오늘
  document.getElementById("exploreDate").value = today_kst();
  // 기간 선택 기본값: 오늘 ~ DB 마지막 날짜
  document.getElementById("exploreDateFrom").value = today_kst();
  if(statsCache?.date_max)
    document.getElementById("exploreDateTo").value = statsCache.date_max;
  await loadExploreData();
  updateWishBadge();
}

/* ══════════════════════════════════════
   ① 탐색 탭
══════════════════════════════════════ */
const EXPLORE_AREAS = {
  all:      {label:'전체',       cinemas:['KT&G상상마당시네마','라이카시네마','한국영상자료원','아트하우스모모','서울아트시네마','에무시네마','씨네큐브','서울영화센터','KU시네마테크','아리랑시네센터','더숲아트시네마','아트나인']},
  hongdae:  {label:'홍대·상암', cinemas:['KT&G상상마당시네마','라이카시네마','한국영상자료원']},
  sinchon:  {label:'신촌·이대', cinemas:['라이카시네마','아트하우스모모']},
  gwanghwa: {label:'광화문·종로',cinemas:['서울아트시네마','에무시네마','씨네큐브','서울영화센터']},
  kondae:   {label:'건대·성수', cinemas:['KU시네마테크']},
  north:    {label:'성북·노원', cinemas:['아리랑시네센터','더숲아트시네마']},
  gangnam:  {label:'강남',      cinemas:['아트나인']},
};

let exploreMode = "direct";    // direct | range | today | tomorrow | saturday | sunday
let exploreSpecialOnly = false; // 특별회차(GV·토크 등) 필터
let exploreRecOnly = false; // 추천 영화만 필터
let exploreDirectOpen = false; // 극장 직접선택 패널
let exploreSelectedCinemas = new Set(EXPLORE_AREAS.all.cinemas);
let exploreData = [];
let exploreSearchQ = "";
let exploreSortMode = "time";
let exploreSortDir = "asc";

function getExploreParams(){
  const now = new Date();
  const kst = d => { const x=new Date(d); x.setHours(x.getHours()+9); return x.toISOString().slice(0,10); };
  const todayStr = kst(now);
  const t = new Date(now.getTime() + 9*3600000);
  const sat = new Date(t); sat.setDate(t.getDate() + ((6-t.getDay()+7)%7 || 7));
  const sun = new Date(sat); sun.setDate(sat.getDate()+1);
  const fmt = d => d.toISOString().slice(0,10);

  if(exploreMode === "range"){
    const df = document.getElementById("exploreDateFrom").value || todayStr;
    const dt = document.getElementById("exploreDateTo").value || (statsCache?.date_max || todayStr);
    return {dateFrom:df, dateTo:dt, timeFrom:"00:00", timeTo:"23:59"};
  }
  if(exploreMode === "direct"){
    const sd = document.getElementById("exploreDate").value || todayStr;
    const tf = document.getElementById("exploreTimeFrom").value || "17";
    const tt = document.getElementById("exploreTimeTo").value || "23";
    return {dateFrom:sd, dateTo:sd, timeFrom:tf+":00", timeTo:tt+":59"};
  }
  // 빠른선택
  let dateFrom = todayStr, dateTo = todayStr;
  if(exploreMode==="tomorrow"){ const tm=new Date(t); tm.setDate(t.getDate()+1); dateFrom=dateTo=fmt(tm); }
  else if(exploreMode==="saturday"){ dateFrom=dateTo=fmt(sat); }
  else if(exploreMode==="sunday")  { dateFrom=dateTo=fmt(sun); }
  return {dateFrom, dateTo, timeFrom:"00:00", timeTo:"23:59"};
}

async function loadExploreData(){
  const el = document.getElementById("explore-content");
  el.innerHTML = `<div class="loading"><div class="spinner"></div>로딩 중…</div>`;
  try{
    const {dateFrom, dateTo, timeFrom, timeTo} = getExploreParams();
    const cinemas = [...exploreSelectedCinemas];
    const params = new URLSearchParams({date_from:dateFrom, date_to:dateTo, time_from:timeFrom, time_to:timeTo});
    cinemas.forEach(c=>params.append("cinema",c));
    if(exploreSearchQ) params.set("movie", exploreSearchQ);
    exploreData = await fetch(`/api/screenings?${params}`).then(r=>r.json());
    renderExploreCards();
    updateExploreHeader(dateFrom, dateTo, timeFrom, timeTo);
  }catch(e){
    el.innerHTML = `<div class="empty">데이터를 불러오지 못했습니다</div>`;
  }
}

function updateExploreHeader(dateFrom, dateTo, timeFrom, timeTo){
  const d = new Date(dateFrom+"T00:00:00");
  const mmdd = dateFrom.slice(5).replace("-","/");
  const dow = DOW_KO[d.getDay()];
  let sub = `${mmdd}(${dow})`;
  if(dateFrom !== dateTo) sub += ` ~ ${dateTo.slice(5).replace("-","/")}`;
  if(timeFrom && timeFrom !== "00:00") sub += ` · ${timeFrom.slice(0,2)}시~${(timeTo||"23:59").slice(0,2)}시`;
  document.getElementById("exploreSub").textContent = sub;
}

function renderExploreCards(){
  const el = document.getElementById("explore-content");
  // 영화+극장+화면 기준 그룹핑 (빠른조회 방식)
  const groups = {};
  exploreData.forEach(r=>{
    const key = `${r.movie}||${r.cinema}||${r.screen||""}`;
    if(!groups[key]){ groups[key]={...r, times:[]}; }
    groups[key].times.push({start:(r.start_dt||"").slice(11,16), end:(r.end_dt||"").slice(11,16), start_dt:r.start_dt, end_dt:r.end_dt, program:r.program, show_type:r.show_type});
  });
  let cards = Object.values(groups);
  if(exploreSearchQ) cards = cards.filter(c=>c.movie.includes(exploreSearchQ));
  if(exploreSpecialOnly) cards = cards.filter(c=>hasSpecialScreening(c.times));
  if(exploreRecOnly){ const recSet2=new Set((recData||[]).map(r=>r.title)); cards=cards.filter(c=>recSet2.has(c.movie)); }

  // 정렬
  const dir = exploreSortDir==="asc"?1:-1;
  if(exploreSortMode==="time") cards.sort((a,b)=>(a.start_dt||"").localeCompare(b.start_dt||"")*dir);
  else cards.sort((a,b)=>(a.movie||"").localeCompare(b.movie||"","ko")*dir);

  document.getElementById("exploreCount").textContent = cards.length ? cards.length+"편" : "";

  if(!cards.length){ el.innerHTML=`<div class="empty">조건에 맞는 상영이 없습니다</div>`; return; }

  const maxLen = Math.max(...cards.map(c=>c.movie.length));
  const cardW = Math.max(200, Math.min(320, 60+24+maxLen*13));
  const recSet = new Set((recData||[]).map(r=>r.title));

  const html = cards.map(g=>{
    const isFree = FREE_CINEMAS.includes(g.cinema);
    const posterHtml = g.poster_url
      ? `<img src="${esc(g.poster_url)}" alt="" loading="lazy" onerror="this.parentNode.textContent='🎬'">`
      : "🎬";
    const venueHtml = g.screen
      ? `<div class="venue-dot${isFree?" free":""}"></div><span>${esc(g.cinema)}</span><span class="venue-sep">·</span><span>${esc(g.screen)}</span>`
      : `<div class="venue-dot${isFree?" free":""}"></div><span>${esc(g.cinema)}</span>${isFree?`<span class="chip-free" style="font-size:10px;font-weight:700;color:var(--green);margin-left:3px;">무료</span>`:""}`;
    const timesHtml = g.times.map(t=>{
      const s = stickerHtml(t.program, t.show_type);
      const schedKey = `${esc(g.movie)}|${esc(g.cinema)}|${esc(g.screen||"")}|${t.start_dt||""}`;
      const wished = isSchedWished(schedKey);
      return `<div class="time-chip${wished?" wished":""}" style="display:flex;align-items:center;gap:3px;cursor:pointer;"
        onclick="event.stopPropagation();">
        ${t.start}<span class="time-dash">-</span>${t.end}${s}<button class="sched-wish-btn swb${wished?" on":""}" data-key="${schedKey}" onclick="event.stopPropagation();toggleSchedWish('${schedKey}','${esc(g.movie)}','${esc(g.cinema)}','${esc(g.screen||"")}','${t.start_dt||""}','${t.end_dt||""}','${esc(g.poster_url||"")}',this)">${wished?"⏰":"➕"}</button>
      </div>`;
    }).join("");
    const titleHtml = g.movie_url
      ? `<a href="${esc(g.movie_url)}" target="_blank" onclick="event.stopPropagation()">${esc(g.movie)}</a>`
      : esc(g.movie);
    return `<div class="quick-card" onclick="openPopup('${esc(g.movie)}','${esc(g.cinema)}','${esc(g.screen||"")}','${esc(g.movie_url||"")}')">
      <div class="qc-poster">${posterHtml}</div>
      <div class="qc-body">
        <div class="qc-title" style="display:flex;align-items:flex-start;gap:4px;">
          <span style="flex:1;min-width:0;">${titleHtml}${recSet&&recSet.has(g.movie)?'<span class="rec-badge" style="margin-left:4px;">★</span>':''}</span>
          <button class="heart-btn${isMovieWished(g.movie)?" on":""}" onclick="event.stopPropagation();toggleMovieWish(this,'${esc(g.movie)}','${esc(g.poster_url||"")}')" title="관심 목록 추가">${isMovieWished(g.movie)?"♥":"♡"}</button>
        </div>
        <div class="qc-venue">${venueHtml}</div>
        <div class="qc-times" style="display:flex;flex-wrap:wrap;gap:4px;">${timesHtml}</div>
      </div>
    </div>`;
  }).join("");

  el.innerHTML = `<div class="explore-grid quick-grid">${html}</div>`;
  el.querySelector(".explore-grid").style.gridTemplateColumns = `repeat(auto-fill,${cardW}px)`;
}

// 직접 설정
function setDirectMode(){
  exploreMode = "direct";
  document.querySelectorAll(".ex-chip[data-mode]").forEach(b=>b.classList.remove("active"));
  document.getElementById("directSetBtn").classList.add("active");
  document.getElementById("rangeToggleBtn").classList.remove("active");
  document.getElementById("directSub").classList.add("open");
  document.getElementById("rangeSub").classList.remove("open");
  if(!document.getElementById("exploreDate").value){
    document.getElementById("exploreDate").value = today_kst();
    document.getElementById("exploreTimeFrom").value = "17";
    document.getElementById("exploreTimeTo").value = "23";
  }
  loadExploreData();
}

// 기간 선택

function setTimeAll(btn){
  btn.classList.add("active");
  document.getElementById("exploreTimeFrom").value = "00";
  document.getElementById("exploreTimeTo").value = "23";
  loadExploreData();
}
function onTimeSelectChange(){
  document.getElementById("timeAllBtn").classList.remove("active");
  loadExploreData();
}

function setRangeMode(){
  exploreMode = "range";
  document.querySelectorAll(".ex-chip[data-mode]").forEach(b=>b.classList.remove("active"));
  document.getElementById("rangeToggleBtn").classList.add("active");
  document.getElementById("directSetBtn").classList.remove("active");
  document.getElementById("rangeSub").classList.add("open");
  document.getElementById("directSub").classList.remove("open");
  // 기본값: From=오늘, To=전체 기간 끝
  if(!document.getElementById("exploreDateFrom").value)

let moviePopupRows = [];
let moviePopupTitle = '';
let moviePopupPosterUrl = '';
let moviePopupSort = 'date'; // 'date' | 'cinema'

function setMoviePopupSort(mode){

  document.getElementById('mpSortDate').classList.toggle('active', mode==='date');
  document.getElementById('mpSortCinema').classList.toggle('active', mode==='cinema');
  renderMoviePopupSchedules();
}

function renderMoviePopupSchedules(){
  const rows = moviePopupRows;
  const title = moviePopupTitle;
  const posterUrl = moviePopupPosterUrl;
  let html = '';

  if(moviePopupSort === 'cinema'){
    // 극장별 그룹핑 → 각 극장 내 날짜순
    const byKey = {};
    rows.forEach(r=>{
      const k = r.cinema+(r.screen?` · ${r.screen}`:'');
      if(!byKey[k]) byKey[k]=[];
      byKey[k].push(r);
    });
    // 극장명 오름차순 정렬
    const sortedKeys = Object.keys(byKey).sort((a,b)=>a.localeCompare(b,'ko'));
    html = sortedKeys.map(label=>{
      const rs = byKey[label].sort((a,b)=>(a.start_dt||'').localeCompare(b.start_dt||''));
      const slots = rs.map(r=>popupSlotHtml(r, title, posterUrl)).join('');
      return `<div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:7px;">${esc(label)}</div>
        <div style="display:flex;flex-direction:column;gap:6px;">${slots}</div>
      </div>`;
    }).join('');
  } else {
    // 날짜순 — 날짜 그룹핑
    const sorted = [...rows].sort((a,b)=>(a.start_dt||'').localeCompare(b.start_dt||''));
    const byDate = {};
    sorted.forEach(r=>{
      const {mmdd, dow} = splitDt(r.start_dt);
      const dk = mmdd+(dow?`(${dow})`:'');
      if(!byDate[dk]) byDate[dk]=[];
      byDate[dk].push(r);
    });
    html = Object.entries(byDate).map(([dateLabel, rs])=>{
      const slots = rs.map(r=>{
        const cinemaLabel = r.cinema+(r.screen?` · ${r.screen}`:'');
        return popupSlotHtml(r, title, posterUrl, cinemaLabel);
      }).join('');
      return `<div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:7px;">${esc(dateLabel)}</div>
        <div style="display:flex;flex-direction:column;gap:6px;">${slots}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('moviePopupSchedules').innerHTML = html
    || `<div style="color:var(--text-muted);font-size:12px;padding:12px 0;">상영 정보 없음</div>`;
}

function popupSlotHtml(r, title, posterUrl, extraLabel=''){
  const {time:stm, dow:sdow} = splitDt(r.start_dt);
  const end = (r.end_dt||'').slice(11,16);
  const s = stickerHtml(r.program, r.show_type);
  const schedKey = `${esc(title)}|${esc(r.cinema)}|${esc(r.screen||'')}|${r.start_dt||''}`;
  const wished = isSchedWished(schedKey);
  const extra = extraLabel ? `<span style="font-size:11px;color:var(--text-muted);margin-left:4px;">${esc(extraLabel)}</span>` : '';
  return `<div class="popup-sched-slot${wished?' wished':''}" style="display:flex;align-items:center;gap:8px;border:1.5px solid ${wished?'var(--green)':'var(--border)'};border-radius:7px;padding:7px 10px;background:${wished?'#EEF5E8':'var(--surface)'};">
    <span style="font-size:13px;font-weight:700;color:var(--text);">${stm}</span>
    <span style="font-size:11px;color:var(--text-muted);">–${end}</span>
    ${extra}${s}
    <button class="sched-wish-btn swb${wished?' on':''}" data-key="${schedKey}" title="${wished?'등록 취소':'스케줄 등록'}" onclick="event.stopPropagation();toggleSchedWish('${schedKey}','${esc(title)}','${esc(r.cinema)}','${esc(r.screen||'')}','${r.start_dt||''}','${r.end_dt||''}','${esc(posterUrl||'')}',this)" style="font-size:13px;margin-left:auto;">${wished?'⏰':'➕'}</button>
  </div>`;
}

function openMoviePopup(title, rows, posterUrl){
  moviePopupTitle = title;
  moviePopupRows = rows;
  moviePopupPosterUrl = posterUrl;

  document.getElementById("moviePopupTitle").textContent = title;
  const poster = document.getElementById("moviePopupPoster");

      document.getElementById("moviePopupDetailMeta").textContent = parts.join(" · ");
      if(d.synopsis){
        const el = document.getElementById("moviePopupSynopsis");
        el.textContent = d.synopsis;
      }
    }).catch(()=>{});

const LS_MOVIE = "wish_movies";   // [{title, poster_url, added_at}]
const LS_SCHED = "wish_scheds";   // [{key, movie, cinema, screen, start_dt, end_dt, poster_url, added_at}]
let wishSubMode = "sched";

// 메모리 캐시 — localStorage 매번 읽지 않도록
let _wishMovieCache = null;
let _wishSchedCache = null;
let _wishSchedSet   = null; // 빠른 key 조회용 Set

function loadWishMovies(){
  if(!_wishMovieCache) try{ _wishMovieCache=JSON.parse(localStorage.getItem(LS_MOVIE)||"[]"); }catch(e){ _wishMovieCache=[]; }
  return _wishMovieCache;
}
function loadWishScheds(){
  if(!_wishSchedCache) try{ _wishSchedCache=JSON.parse(localStorage.getItem(LS_SCHED)||"[]"); }catch(e){ _wishSchedCache=[]; }
  return _wishSchedCache;
}
function saveWishMovies(arr){ _wishMovieCache=arr; localStorage.setItem(LS_MOVIE, JSON.stringify(arr)); updateWishBadge(); }
function saveWishScheds(arr){ _wishSchedCache=arr; _wishSchedSet=new Set(arr.map(s=>s.key)); localStorage.setItem(LS_SCHED, JSON.stringify(arr)); updateWishBadge(); }

function isMovieWished(title){ return loadWishMovies().some(m=>m.title===title); }
function isSchedWished(key){
  if(!_wishSchedSet){ _wishSchedSet=new Set(loadWishScheds().map(s=>s.key)); }
  return _wishSchedSet.has(key);
}

function updateWishBadge(){
  const sm = loadWishMovies().length;
  const ss = loadWishScheds().length;
  const total = sm + ss;
  document.getElementById("wish-count-badge").textContent = total||"0";
  document.getElementById("tab-btn-wish").querySelector(".tab-badge").textContent = total||"0";
  const smEl = document.getElementById("wish-sched-badge");
  const mvEl = document.getElementById("wish-movie-badge");
  if(smEl) smEl.textContent = ss;
  if(mvEl) mvEl.textContent = sm;
}

function toggleMovieWish(btn, title, posterUrl){
  let arr = loadWishMovies();
  const idx = arr.findIndex(m=>m.title===title);
  if(idx>=0){
    arr.splice(idx,1);
    btn.classList.remove("on");
    btn.textContent="♡";
    gtag('event','movie_unwish',{movie_title:title});
  } else {
    arr.push({title, poster_url:posterUrl, added_at:new Date().toISOString()});
    btn.classList.add("on");
    btn.textContent="♥";
    gtag('event','movie_wish',{movie_title:title});
  }
  saveWishMovies(arr);
}

function toggleSchedWish(key, movie, cinema, screen, startDt, endDt, posterUrl, btn){
  let arr = loadWishScheds();
  const idx = arr.findIndex(s=>s.key===key);
  const adding = idx < 0;
  if(adding){
    arr.push({key, movie, cinema, screen, start_dt:startDt, end_dt:endDt, poster_url:posterUrl, added_at:new Date().toISOString()});
    gtag('event','sched_wish',{movie_title:movie, cinema_name:cinema, start_dt:startDt});
  } else {
    arr.splice(idx,1);
    gtag('event','sched_unwish',{movie_title:movie, cinema_name:cinema, start_dt:startDt});
  }
  saveWishScheds(arr);
  // DOM 즉시 업데이트 — 재렌더 없음
  // 페이지 내 동일 key를 가진 모든 버튼 동기화 (btn 포함)
  document.querySelectorAll(`.swb[data-key="${CSS.escape(key)}"]`).forEach(b=>{
    b.classList.toggle("on", adding);
    b.textContent = adding ? "⏰" : "➕";
  });
  if(btn && !btn.dataset.key){ // data-key 없는 경우 fallback
    btn.classList.toggle("on", adding);
    btn.textContent = adding ? "⏰" : "➕";
  }
}

function renderWishScheds(el){

  const now = new Date();

  const groups={};
  arr.forEach(s=>{

    if(!groups[d]) groups[d]=[];
    groups[d].push(s);
  });
  const html = Object.keys(groups).sort().map(date=>{

    const dow = DOW_KO[d.getDay()], dowIdx=d.getDay();
    const label = `${date.slice(5).replace("-","/")} ${renderDowBadge(dow,dowIdx)}`;
    const rowsHtml = rows.sort((a,b)=>(a.start_dt||"").localeCompare(b.start_dt||"")).map(s=>{
      const start=(s.start_dt||"").slice(11,16);
      const end=(s.end_dt||"").slice(11,16);

      return `<div class="wish-row${isPast?' past':''}">

          <div class="wish-row-movie">${esc(s.movie)}</div>
          <div class="wish-row-meta">${esc(s.cinema)}${s.screen?` · ${esc(s.screen)}`:""}</div>

      </div>`;
    }).join("");
    return `<div class="wish-date-group">
      <div class="wish-date-label">${label}<span style="font-size:11px;font-weight:400;color:var(--text-sub);">${rows.length}건</span></div>

  const labels = {count:"상영횟수", title:"제목", runtime:"러닝타임"};
  const defaultDir = {count:"desc", title:"asc", runtime:"desc"};
  if(movieSortMode === mode){
    movieSortDir = movieSortDir === "asc" ? "desc" : "asc";
  } else {
    movieSortMode = mode;
    movieSortDir = defaultDir[mode];
  }
  // 모든 버튼 원래 텍스트로 초기화
  document.querySelectorAll(".movie-sort-btn").forEach(b=>{

  });

const MOVIE_PAGE = 10;
let movieShowCount = MOVIE_PAGE;

function renderMovieGrid(resetCount=true){
  if(!movieData.length){ document.getElementById("movie-grid-content").innerHTML=`<div class="empty">상영 정보가 없습니다</div>`; return; }
  if(resetCount) movieShowCount = MOVIE_PAGE;
  const groups={};
  movieData.forEach(r=>{
    if(!groups[r.movie]) groups[r.movie]=[];
    groups[r.movie].push(r);
  });
  const recFilterSet = movieRecOnly ? new Set((recData||[]).map(r=>r.title)) : null;
  let titles=Object.keys(groups).filter(t=>{
    if(movieSearchQ && !t.includes(movieSearchQ)) return false;
    if(movieDirectorQ){
      const dir=(groups[t][0]?.director||"").toLowerCase();
      if(!dir.includes(movieDirectorQ.toLowerCase())) return false;
    }
    if(recFilterSet && !recFilterSet.has(t)) return false;
    return true;
  });
  // 정렬 (방향 포함)
  const dir = movieSortDir === "asc" ? 1 : -1;
  if(movieSortMode==="count")   titles.sort((a,b)=>(groups[a].length - groups[b].length) * dir);
  else if(movieSortMode==="title") titles.sort((a,b)=>a.localeCompare(b,"ko") * dir);
  else if(movieSortMode==="runtime") titles.sort((a,b)=>{
    const ra=groups[a].find(r=>r.runtime)?.runtime||0;
    const rb=groups[b].find(r=>r.runtime)?.runtime||0;
    return (ra - rb) * dir;
  });
  if(!titles.length){ document.getElementById("movie-grid-content").innerHTML=`<div class="empty">검색 결과가 없습니다</div>`; return; }
  const recSet = new Set((recData||[]).map(r=>r.title));
  const visible = titles.slice(0, movieShowCount);
  const remaining = titles.length - visible.length;
  const html=visible.map(title=>{
    const rows=groups[title];
    const runtime=rows.find(r=>r.runtime)?.runtime;
    const posterUrl=rows[0].poster_url||'';
    const thumb=posterUrl
      ?`<img data-src="${esc(posterUrl)}" alt="" class="lazy-img" onerror="this.parentNode.textContent='🎬'">`
      :"🎬";
    const _encRows=encodeURIComponent(JSON.stringify(rows.map(r=>({cinema:r.cinema,screen:r.screen||'',start_dt:r.start_dt,end_dt:r.end_dt,program:r.program,show_type:r.show_type,movie_url:r.movie_url||'',poster_url:r.poster_url||''}))));
    const _encPost=encodeURIComponent(posterUrl);
    const isRec=recSet&&recSet.has(title);
    const dirText=rows[0]?.director||'';
    return `<div class="mv-card${isRec?' has-rec':''}" onclick="onMovieCardClick('${esc(title)}','${_encRows}','${_encPost}')">
      <div class="mv-poster">${thumb}</div>
      ${isRec?'<div class="mv-rec-badge">★</div>':''}
      <div class="mv-info">
        <div class="mv-title">${esc(title)}</div>
        <div class="mv-meta">${dirText?esc(dirText)+(runtime?' · ':''):''}${runtime?runtime+'분':''}</div>
        <div class="mv-count">${rows.length}회 상영</div>
      </div>
      <button class="mv-wish-btn${isMovieWished(title)?' on':''}" onclick="event.stopPropagation();toggleMovieWish(this,'${esc(title)}','${esc(posterUrl)}')" title="관심 목록 추가">${isMovieWished(title)?'♥':'♡'}</button>
    </div>`;
  }).join("");
  const moreBtn = remaining > 0
    ? `<div style="grid-column:1/-1;text-align:center;padding:10px 0;">
        <button onclick="loadMoreMovies()" style="font-family:inherit;font-size:13px;font-weight:600;padding:9px 28px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;">
          더보기 (${remaining}편 더)
        </button>
       </div>`
    : "";
  const mgc = document.getElementById("movie-grid-content");
  mgc.className = "movie-card-grid";
  mgc.innerHTML = `${html}${moreBtn}`;
  lazyLoadImages();
}

function loadMoreMovies(){
  const grid = document.getElementById("movie-grid-content");
  // 더보기 버튼 제거
  const oldBtn = grid.querySelector(".more-btn-wrap");
  if(oldBtn) oldBtn.remove();

  const groups={};
  movieData.forEach(r=>{
    if(!groups[r.movie]) groups[r.movie]=[];
    groups[r.movie].push(r);
  });
  let titles=Object.keys(groups).filter(t=>{
    if(movieSearchQ && !t.includes(movieSearchQ)) return false;
    if(movieDirectorQ){
      const dir=(groups[t][0]?.director||"").toLowerCase();
      if(!dir.includes(movieDirectorQ.toLowerCase())) return false;
    }
    return true;
  });
  const dir = movieSortDir === "asc" ? 1 : -1;
  if(movieSortMode==="count")   titles.sort((a,b)=>(groups[a].length - groups[b].length) * dir);
  else if(movieSortMode==="title") titles.sort((a,b)=>a.localeCompare(b,"ko") * dir);
  else if(movieSortMode==="runtime") titles.sort((a,b)=>{
    const ra=groups[a].find(r=>r.runtime)?.runtime||0;
    const rb=groups[b].find(r=>r.runtime)?.runtime||0;
    return (ra - rb) * dir;
  });

  const newTitles = titles.slice(movieShowCount, movieShowCount + MOVIE_PAGE);
  movieShowCount += MOVIE_PAGE;
  const remaining = titles.length - movieShowCount;
  const recSet = new Set((recData||[]).map(r=>r.title));

  // 새 카드 추가 (renderMovieGrid와 동일 형태)
  const recSet2 = new Set((recData||[]).map(r=>r.title));
  const cardGrid = grid;  // movie-grid-content 자체가 그리드
  newTitles.forEach(title=>{
    const rows=groups[title];
    const runtime=rows.find(r=>r.runtime)?.runtime;
    const posterUrl=rows[0].poster_url||'';
    const thumb=posterUrl?`<img data-src="${esc(posterUrl)}" alt="" class="lazy-img" onerror="this.parentNode.textContent='🎬'">`:"🎬";
    const _encRows=encodeURIComponent(JSON.stringify(rows.map(r=>({cinema:r.cinema,screen:r.screen||'',start_dt:r.start_dt,end_dt:r.end_dt,program:r.program,show_type:r.show_type,movie_url:r.movie_url||'',poster_url:r.poster_url||''}))));
    const _encPost=encodeURIComponent(posterUrl);
    const isRec=recSet2.has(title);
    const dirText=rows[0]?.director||'';
    const card=document.createElement("div");
    card.className="mv-card"+(isRec?" has-rec":"");
    card.onclick=()=>onMovieCardClick(title,_encRows,_encPost);
    card.innerHTML=`
      <div class="mv-poster">${thumb}</div>
      ${isRec?'<div class="mv-rec-badge">★</div>':''}
      <div class="mv-info">
        <div class="mv-title">${esc(title)}</div>
        <div class="mv-meta">${dirText?esc(dirText)+(runtime?' · ':''):''}${runtime?runtime+'분':''}</div>
        <div class="mv-count">${rows.length}회 상영</div>
      </div>

    cardGrid.appendChild(card);
  });

  // 더보기 버튼 재추가
  if(remaining > 0){
    const wrap = document.createElement("div");
    wrap.style.cssText = "grid-column:1/-1;text-align:center;padding:10px 0;";

    cardGrid.appendChild(wrap);
  }
  lazyLoadImages();
}

// 뷰포트 진입 시 포스터 로드
function lazyLoadImages(){
  const imgs = document.querySelectorAll("img.lazy-img[data-src]");
  if("IntersectionObserver" in window){
    const obs = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          const img = e.target;
          img.src = img.dataset.src;
          img.removeAttribute("data-src");
          img.classList.remove("lazy-img");
          obs.unobserve(img);
        }
      });
    },{rootMargin:"100px"});
    imgs.forEach(img=>obs.observe(img));
  } else {
    // 폴백: 그냥 다 로드
    imgs.forEach(img=>{ img.src=img.dataset.src; img.removeAttribute("data-src"); });
  }
}


async function goToMovieTab(title){

  renderMovieGrid();
  // 해당 영화 그룹 자동 펼침 (렌더 후 약간 딜레이)

      if(h.querySelector(".movie-group-title")?.textContent?.includes(title)){
        const rows = h.nextElementSibling;
        if(rows && !rows.classList.contains("open")) rows.classList.add("open");
        h.scrollIntoView({behavior:"smooth", block:"center"});
      }
    });
  }, 100);
}

function filterMovieGroups(q){ movieSearchQ=q; renderMovieGrid(); }
function toggleMovieRows(hdr){ hdr.nextElementSibling.classList.toggle("open"); }

async function refreshData(){
  const btn=document.getElementById("refreshBtn");
  btn.textContent="↻ 갱신 중…";
  await loadStats();
  await loadExploreData();
  if(document.getElementById("tab-cinema").style.display!=="none") { cinemaData=[]; await loadCinemaTabData(); }
  if(document.getElementById("tab-movie").style.display!=="none")  { movieData=[];  await loadMovieTabData(); }

}

window.addEventListener("scroll",()=>{
  const b=document.getElementById("scrollTopBtn");
  if(b) b.classList.toggle("visible",window.scrollY>200);
});

init();
