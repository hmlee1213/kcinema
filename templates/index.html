<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 뭐 볼까?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<!-- Google Analytics (GA4) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXXXXX');
  function trackSearch(query, cinemas, resultCount) {
    gtag('event', 'search', { search_term: query, cinema_filter: cinemas.join(','), result_count: resultCount });
  }
  function trackCinemaClick(cinemaName) {
    gtag('event', 'cinema_click', { cinema_name: cinemaName });
  }
  function trackTabSwitch(tabName) {
    gtag('event', 'tab_switch', { tab_name: tabName });
  }
</script>
<style>
:root {
  --bg:#F5F4F0;--surface:#fff;--surface2:#EDECE8;--border:#DDDBD4;--border2:#CDD2DB;
  --text:#1A1916;--text-muted:#7A7870;--text-sub:#B0AEA6;
  --green:#2D5A1B;--green-light:#EEF4EA;
  --chip-bg:#666666;
  --radius:10px;--shadow:0 1px 4px rgba(0,0,0,.07);--shadow-md:0 6px 20px rgba(0,0,0,.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;}

/* ── 헤더 ── */
header{background:var(--text);color:#fff;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:16px;height:52px;}
.logo{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;letter-spacing:.01em;color:#fff;white-space:nowrap;flex-shrink:0;}
.header-stats{display:flex;gap:16px;margin-left:auto;font-size:11px;color:rgba(255,255,255,.7);}
.header-stats strong{color:#fff;font-weight:700;}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.2;}
.stat-item .stat-label{font-size:11px;color:rgba(255,255,255,.7);}
.stat-item strong{font-size:11px;font-weight:700;color:#fff;}
.header-refresh{font-size:11px;font-weight:600;font-family:inherit;padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.7);cursor:pointer;transition:all .12s;}
.header-refresh:hover{background:rgba(255,255,255,.1);color:#fff;}

/* ── 탭 바 ── */
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:52px;z-index:99;}
.tab-bar-inner{max-width:1280px;margin:0 auto;display:flex;}
.tab{padding:12px 18px;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;user-select:none;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--green);border-bottom-color:var(--green);}
.tab-badge{display:inline-block;background:var(--surface2);color:var(--text-muted);font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px;margin-left:4px;}
.tab.active .tab-badge{background:var(--green-light);color:var(--green);}

/* ── 메인 ── */
.main{max-width:1280px;margin:0 auto;padding:20px 24px 60px;}

/* ── 공통 섹션 헤더 ── */
.section-header{margin-bottom:16px;}
.quick-title-row{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;}
.section-title{font-family:'DM Serif Display',serif;font-size:20px;}
.section-sub{font-size:12px;color:var(--text-muted);}
.quick-ctrl-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.day-tabs{display:flex;gap:6px;}
.day-tab{font-size:12px;font-weight:600;font-family:inherit;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .12s;}
.day-tab:hover{border-color:var(--text);color:var(--text);}
.day-tab.active{background:var(--text);border-color:var(--text);color:#fff;}
.quick-sort-btns{display:flex;gap:5px;margin-left:auto;}
.quick-sort-btn{font-size:11px;font-weight:600;font-family:inherit;padding:4px 11px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .12s;white-space:nowrap;}
.quick-sort-btn:hover{border-color:var(--text);color:var(--text);}
.quick-sort-btn.active{background:var(--text);border-color:var(--text);color:#fff;}
.sticker{display:inline-block;font-size:9px;font-weight:700;background:#E5E7EB;color:#374151;padding:1px 4px;border-radius:3px;white-space:nowrap;vertical-align:middle;margin-left:4px;letter-spacing:.02em;}

/* ── 로딩/빈상태 ── */
.loading{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:13px;}
.spinner{width:26px;height:26px;border:2.5px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px;}

/* ── 맨위로 ── */
.scroll-top-btn{position:fixed;bottom:28px;right:28px;width:42px;height:42px;border-radius:50%;background:#111827;color:#fff;border:none;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:200;line-height:1;}
.scroll-top-btn.visible{opacity:1;pointer-events:auto;}
.scroll-top-btn:hover{background:#374151;transform:translateY(-2px);}

/* ══════════════════════════════════
   ① 빠른 조회
══════════════════════════════════ */
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}
.quick-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .18s;display:flex;flex-direction:row;overflow:hidden;align-items:stretch;}
.quick-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.qc-poster{width:60px;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;align-self:stretch;}
.qc-poster img{width:100%;height:100%;object-fit:cover;}
.qc-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;padding:10px 12px 12px;}
.qc-title{font-size:13px;font-weight:700;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.qc-title a{color:inherit;text-decoration:none;border-bottom:1.5px solid var(--green);}
.qc-title a:hover{color:var(--green);}
.qc-venue{font-size:11px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:4px;overflow:hidden;flex-wrap:wrap;}
.venue-dot{width:6px;height:6px;border-radius:50%;background:var(--text);flex-shrink:0;}
.venue-dot.free{background:var(--green);}
.venue-sep{color:var(--border2);font-size:11px;}
.qc-times{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.qc-date{font-size:11px;font-weight:600;color:var(--text-muted);display:flex;align-items:center;gap:4px;}
.time-chip{display:inline-flex;align-items:center;background:var(--chip-bg);color:#fff;border-radius:4px;padding:3px 8px;font-size:11px;font-weight:600;white-space:nowrap;gap:0;}
.time-dash{color:rgba(255,255,255,.7);font-weight:800;margin:0 3px;font-size:12px;}
.time-chip .sticker{background:rgba(255,255,255,.2);color:#fff;margin-left:5px;}

/* ══════════════════════════════════
   팝업
══════════════════════════════════ */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px;}
.popup-overlay.open{display:flex;}
.popup{background:var(--surface);border-radius:14px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;position:relative;animation:popIn .16s ease;}
@keyframes popIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.popup-close{position:absolute;top:12px;right:14px;width:26px;height:26px;border-radius:50%;border:none;background:var(--surface2);color:var(--text-muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1;}
.popup-close:hover{background:var(--text);color:#fff;}
.popup-top{display:flex;gap:14px;padding:18px 18px 14px;}
.popup-poster{width:70px;height:98px;border-radius:6px;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;}
.popup-poster img{width:100%;height:100%;object-fit:cover;}
.popup-info{flex:1;min-width:0;padding-right:20px;}
.popup-title{font-size:15px;font-weight:800;line-height:1.3;margin-bottom:7px;}
.popup-meta{font-size:12px;color:var(--text-muted);line-height:2.}
.popup-meta span{color:var(--text);font-weight:600;}
.popup-divider{height:1px;background:var(--border);margin:0 18px;}
.popup-schedules{padding:12px 18px 18px;}
.popup-sched-title{font-size:10px;font-weight:700;color:var(--text-sub);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;}
.sched-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;flex-wrap:wrap;}
.sched-row:last-child{border-bottom:none;}
.sched-cinema{font-weight:600;flex:1;}
.sched-time-chip{background:var(--chip-bg);color:#fff;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;white-space:nowrap;}

/* ══════════════════════════════════
   ② 극장별
══════════════════════════════════ */
.filter-ctrl-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
/* 극장 칩: 6열 균등 그리드 */
.cinema-chips-wrap{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;flex:1;}
.cinema-chip-btn{font-size:12px;font-weight:600;font-family:inherit;padding:5px 0;border-radius:6px;border:1.5px solid var(--text);background:var(--surface);color:var(--text);cursor:pointer;transition:all .12s;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cinema-chip-btn.off{border-color:var(--border);color:var(--text-sub);text-decoration:line-through;}
.cinema-chip-btn:not(.off):hover{background:var(--text);color:#fff;}
.ctrl-btns{display:flex;gap:6px;flex-shrink:0;}
.ctrl-btn{font-size:11px;font-weight:700;font-family:inherit;padding:4px 12px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .12s;}
.ctrl-btn:hover{background:var(--text);border-color:var(--text);color:#fff;}


.cinema-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cinema-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.cinema-group-header{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface2);}
.cinema-group-name{font-size:13px;font-weight:700;flex:1;display:flex;align-items:center;gap:6px;}
.cinema-group-meta{font-size:12px;color:var(--text-muted);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
/* 극장 카드 내부 2열 그리드 — 헤더 배경색과 동일한 구분선 */
.cinema-rows-2col{
  display:grid;
  grid-template-columns:1fr 1fr;
  column-gap:0;
}
.cinema-rows-2col .c-row{border-bottom:1px solid var(--surface2);}
.cinema-rows-2col .c-row:nth-child(odd){border-right:2px solid var(--surface2);}
.cinema-rows-2col .c-row:nth-last-child(-n+2){border-bottom:none;}
/* 무료 태그 */
.free-tag{font-size:10px;font-weight:700;background:#D1FAE5;color:#065F46;padding:1px 6px;border-radius:3px;}
.chip-loc{font-size:9px;font-weight:600;background:#E5E7EB;color:#6B7280;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;}
.chip-free{font-size:9px;font-weight:700;background:#D1FAE5;color:#065F46;padding:1px 5px;border-radius:3px;margin-left:3px;vertical-align:middle;}
.c-row{display:grid;grid-template-columns:70px 108px 2.5fr;align-items:center;gap:6px;padding:7px 14px;border-bottom:1px solid var(--border);font-size:12px;}
.c-row:last-child{border-bottom:none;}
.c-date{font-weight:600;color:var(--text);white-space:nowrap;}
.c-time{font-weight:600;color:var(--text);white-space:nowrap;}
.c-movie{font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;}
.c-movie a{color:var(--text);text-decoration:none;border-bottom:1.5px solid var(--green);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.c-movie a:hover{color:var(--green);}

/* ══════════════════════════════════
   ③ 영화별
══════════════════════════════════ */
.movie-search-bar{position:relative;margin-bottom:14px;}
.movie-search-bar input{width:100%;max-width:320px;padding:8px 12px 8px 32px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;color:var(--text);outline:none;background:var(--surface);}
.movie-search-bar input:focus{border-color:var(--green);}
.movie-search-bar::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;}
/* 영화별 정렬 버튼 */
.movie-sort-btn{font-size:11px;font-weight:600;font-family:inherit;padding:5px 12px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .12s;white-space:nowrap;}
.movie-sort-btn:hover{border-color:var(--text);color:var(--text);}
.movie-sort-btn.active{background:var(--text);border-color:var(--text);color:#fff;}
/* 관리자 추천 배지 */
.rec-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;background:#FEF3C7;color:#92400E;padding:2px 6px;border-radius:4px;flex-shrink:0;}
.movie-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.movie-group-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;transition:background .12s;}
.movie-group-header:hover{background:#FAFAF8;}
.movie-thumb{width:32px;height:44px;background:var(--surface2);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;}
.movie-thumb img{width:100%;height:100%;object-fit:cover;}
.movie-group-info{flex:1;min-width:0;}
.movie-group-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.movie-group-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}
.movie-group-count{font-size:11px;font-weight:700;background:var(--surface2);padding:2px 7px;border-radius:10px;color:var(--text-muted);white-space:nowrap;flex-shrink:0;}
.movie-rows{display:none;border-top:1px solid var(--border);}
.movie-rows.open{display:block;}
/* 영화별 행: 극장정보 / 날짜 / 시간 */
.m-row{display:grid;grid-template-columns:1fr 68px 104px;align-items:center;gap:6px;padding:7px 14px;border-bottom:1px solid var(--border);font-size:12px;}
.m-row:last-child{border-bottom:none;}
.m-cinema-cell{display:flex;align-items:center;gap:5px;overflow:hidden;}
.m-cinema{font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.m-screen{color:var(--text-muted);white-space:nowrap;flex-shrink:0;}
.m-free{font-size:10px;font-weight:700;background:#D1FAE5;color:#065F46;padding:1px 5px;border-radius:3px;flex-shrink:0;}
.m-date{font-weight:600;color:var(--text);white-space:nowrap;}
.m-time{font-weight:600;color:var(--text);white-space:nowrap;display:flex;align-items:center;gap:0;}

/* ══════════════════════════════════
   ④ 상세 조회
══════════════════════════════════ */
.filter-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:14px;}
.filter-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:10px;}
.filter-row:last-child{margin-bottom:0;}
.filter-label{font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.filter-input{padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:13px;color:var(--text);outline:none;background:var(--surface);}
.filter-input:focus{border-color:var(--green);}
input[type="date"].filter-input{border:none;background:#fff;color:var(--text);padding:7px 4px;font-size:13px;cursor:pointer;}
input[type="date"].filter-input:focus{outline:none;}
.shortcut{font-size:11px;font-weight:600;font-family:inherit;padding:4px 10px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .12s;}
.shortcut.active,.shortcut:hover{background:var(--text);border-color:var(--text);color:#fff;}
.detail-chip{font-size:11px;font-weight:600;font-family:inherit;padding:5px 4px;border-radius:6px;border:1.5px solid var(--text);background:var(--surface);color:var(--text);cursor:pointer;user-select:none;transition:all .12s;text-align:center;white-space:normal;word-break:keep-all;line-height:1.3;}
.detail-chip.off{border-color:var(--border);color:var(--text-sub);text-decoration:line-through;}
.btn-search{padding:8px 22px;background:var(--text);color:#fff;border:none;border-radius:7px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .12s;}
.btn-search:hover{opacity:.8;}
.btn-excel{padding:8px 16px;background:var(--surface);color:var(--text);border:1.5px solid var(--border2);border-radius:7px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;}
.btn-excel:hover{border-color:var(--text);}
.btn-reset{padding:8px 14px;background:var(--surface);color:var(--text-muted);border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;}
.btn-reset:hover{color:var(--text);border-color:var(--text);}
.filter-note{font-size:11px;color:var(--green);font-weight:600;}

.result-meta{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.result-count{font-size:13px;color:var(--text-muted);}
.result-count strong{color:var(--text);font-weight:700;}
.view-toggle{display:flex;background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;overflow:hidden;margin-left:auto;}
.v-btn{padding:5px 13px;font-size:11px;font-weight:600;font-family:inherit;background:none;border:none;color:var(--text-muted);cursor:pointer;transition:all .1s;}
.v-btn.active{background:var(--surface);color:var(--text);}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;}
thead{background:var(--surface2);}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}
th:hover{color:var(--text);}
th.sort-asc::after{content:" ↑";font-size:9px;}
th.sort-desc::after{content:" ↓";font-size:9px;}
.sort-reset-th{padding:0 8px;}
.sort-reset-btn{font-size:10px;font-family:inherit;font-weight:600;padding:3px 7px;border-radius:4px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);}
.sort-reset-btn:hover{background:var(--text);color:#fff;border-color:var(--text);}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFAF8;}

/* 테이블 내 요소 — 전부 흰바탕 검정글씨 */
.dt-cinema{font-weight:700;font-size:13px;color:var(--text);}
.dt-screen{font-size:12px;color:var(--text-muted);margin-left:4px;}
.dt-date{font-size:12px;font-weight:600;color:var(--text);}
.dt-dow{display:inline-block;font-size:10px;font-weight:700;background:#111827;color:#fff;padding:1px 4px;border-radius:3px;margin-left:3px;vertical-align:middle;}
.dt-dow.sat,.dt-dow.sun{background:#990000;}
.dt-time{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;}
.movie-link{color:var(--text);text-decoration:none;font-weight:600;border-bottom:1.5px solid var(--green);}
.movie-link:hover{color:var(--green);}

/* 카드 뷰 */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;transition:box-shadow .15s,transform .15s;display:flex;flex-direction:column;gap:7px;}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.card-title{font-weight:700;font-size:14px;line-height:1.35;color:var(--text);}
.card-time{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;font-weight:600;color:var(--text);}
.card-cinema-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.card-cinema-badge{font-size:11px;font-weight:700;background:var(--text);color:#fff;padding:2px 7px;border-radius:4px;text-decoration:none;white-space:nowrap;}
.card-cinema-badge:hover{opacity:.8;}
.screen-tag{background:#E5E7EB;color:#111;font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;}

/* ══════════════════════════════════
   ⑤ 추천
══════════════════════════════════ */
.rec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.rec-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;transition:all .18s;
  display:flex;flex-direction:column;
}
.rec-card:hover{box-shadow:var(--shadow-md);transform:translateY(-3px);}
.rec-poster{
  width:100%;aspect-ratio:2/3;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;overflow:hidden;position:relative;
}
.rec-poster img{width:100%;height:100%;object-fit:cover;}
.rec-body{padding:12px 14px 14px;flex:1;display:flex;flex-direction:column;gap:6px;}
.rec-title{font-size:14px;font-weight:700;line-height:1.3;}
.rec-desc{font-size:12px;color:var(--text-muted);line-height:1.6;flex:1;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.rec-awards{display:flex;flex-wrap:wrap;gap:4px 0;margin-top:4px;}
.rec-award-row{display:flex;align-items:center;margin-right:8px;margin-bottom:4px;flex-shrink:0;}
.rec-award-fest{
  font-size:10px;font-weight:700;
  background:#555;color:#fff;
  padding:2px 7px;border-radius:3px 0 0 3px;
  white-space:nowrap;
}
.rec-award-detail{
  font-size:10px;font-weight:600;
  color:var(--text);
  padding:2px 6px 2px 5px;
  border:1px solid #ddd;border-left:none;
  border-radius:0 3px 3px 0;
  white-space:nowrap;
}
.rec-award-more{
  font-size:10px;font-weight:700;color:var(--text-muted);
  padding:2px 6px;border:1px solid var(--border);border-radius:3px;
  align-self:center;margin-bottom:4px;
}
.rec-count{font-size:11px;font-weight:700;color:var(--green);margin-top:2px;}
.rec-empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
.rec-empty-icon{font-size:40px;margin-bottom:12px;}

/* ══════════════════════════════════
   영화별 그리드
══════════════════════════════════ */
.movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;}

@media(max-width:700px){
  .cinema-chips-wrap{grid-template-columns:repeat(3,1fr);}
  .rec-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .quick-grid{grid-template-columns:repeat(2,1fr) !important;}
  .cinema-grid{grid-template-columns:1fr;}
  .movie-grid{grid-template-columns:repeat(2,1fr);}
  .cinema-rows-2col{grid-template-columns:1fr;}
  .cinema-rows-2col .c-row:nth-child(odd){border-right:none;}

  .cinema-rows-2col .c-row:last-child{border-bottom:none;}
  .c-row{grid-template-columns:58px 86px 1fr;}
  .m-row{grid-template-columns:1fr 60px 96px;}
  .cards-grid{grid-template-columns:1fr;}
  .main{padding:16px 14px 40px;}
}

}

<script>
/* ══════════════════════════════════════
   유틸
══════════════════════════════════════ */
const DOW_KO = ["일","월","화","수","목","금","토"];
const FREE_CINEMAS = ["서울영화센터","한국영상자료원"];
const CINEMA_ORDER = [
  "KT&G상상마당시네마","KU시네마테크","더숲아트시네마","라이카시네마",
  "서울아트시네마","씨네큐브","아리랑시네센터","아트나인","아트하우스모모","에무시네마",
  "서울영화센터","한국영상자료원"
];
const CINEMA_LOC = {
  "KT&G상상마당시네마":"홍대","KU시네마테크":"건대","더숲아트시네마":"노원",
  "라이카시네마":"연희동","서울아트시네마":"서대문","씨네큐브":"광화문",
  "아리랑시네센터":"성북구","아트나인":"이수","아트하우스모모":"이대","에무시네마":"광화문",
  "서울영화센터":"충무로","한국영상자료원":"상암"
};

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function fmtKST(d){
  const kst = new Date(d.getTime() + 9*60*60*1000);
  return kst.toISOString().slice(0,10);
}

function today_kst(){ return fmtKST(new Date()); }

function splitDt(dt){
  if(!dt) return {date:"",mmdd:"",time:"",dow:"",dowIdx:-1};
  const date=dt.slice(0,10), time=dt.slice(11,16);
  const d=new Date(date+"T00:00:00");
  const dowIdx=d.getDay();
  return {date, mmdd:date.slice(5).replace("-","/"), time, dow:DOW_KO[dowIdx], dowIdx};
}

function renderDowBadge(dow, dowIdx){
  const cls = (dowIdx===0||dowIdx===6) ? "dt-dow sat" : "dt-dow";
  return `<span class="${cls}">${dow}</span>`;
}

function stickerHtml(program, showType){
  const tags = [];
  const src = ((program||"")+" "+(showType||"")).toLowerCase();
  if(src.includes("gv")||src.includes("감독")) tags.push("GV");
  else if(src.includes("토크")||src.includes("talk")) tags.push("토크");
  if(src.includes("굿즈")) tags.push("굿즈");
  return tags.map(t=>`<span class="sticker">${t}</span>`).join("");
}

/* ══════════════════════════════════════
   앱 상태
══════════════════════════════════════ */
let quickData = [];
let cinemaData = [];
let movieData  = [];
let detailData = [];
let recData    = [];  // 관리자 추천 목록
let detailView = "table";
let sortCol = "start_dt", sortDir = 1;
let quickMode = "evening";
let quickSort = "time"; // time | title
let quickSortDir = "asc";

function setQuickSort(btn, sort){
  const labels = {time:"상영시작순", title:"제목순"};
  if(quickSort === sort){
    quickSortDir = quickSortDir === "asc" ? "desc" : "asc";
  } else {
    quickSort = sort;
    quickSortDir = "asc";
  }
  document.querySelectorAll(".quick-sort-btn").forEach(b=>{
    b.classList.remove("active");
    b.textContent = labels[b.dataset.sort] + " ↑";
  });
  btn.classList.add("active");
  btn.textContent = labels[sort] + (quickSortDir === "asc" ? " ↑" : " ↓");
  renderQuickCards();
}
let cinemaChipState = {}; // name → true(on)/false(off)
let statsCache = null;

/* ══════════════════════════════════════
   초기화
══════════════════════════════════════ */
async function init(){
  await loadStats();
  initDetailCinemaChips();
  initCinemaTabChips();
  initDetailDates();
  await loadQuickData();
  // 탭별 데이터는 전환 시 lazy load
}

async function loadStats(){
  try{
    const d = await fetch("/api/stats").then(r=>r.json());
    statsCache = d;
    document.getElementById("statCinemas").textContent = d.cinemas||"—";
    document.getElementById("statTotal").textContent   = (d.total||0).toLocaleString();
    document.getElementById("statMovies").textContent  = d.movies||"—";
    document.getElementById("movie-count-badge").textContent = d.movies||"—";
  }catch(e){}
}

/* ══════════════════════════════════════
   탭 전환
══════════════════════════════════════ */
async function switchTab(name){
  ["quick","cinema","movie","detail","rec"].forEach(t=>{
    document.getElementById("tab-"+t).style.display = t===name?"block":"none";
    document.getElementById("tab-btn-"+t).classList.toggle("active", t===name);
  });
  trackTabSwitch(name);
  if(name==="cinema" && cinemaData.length===0) await loadCinemaTabData();
  if(name==="movie"  && movieData.length===0)  await loadMovieTabData();
  if(name==="rec") await loadRecTab();
}

/* ══════════════════════════════════════
   ① 빠른 조회
══════════════════════════════════════ */
function getQuickDateRange(mode){
  const now = new Date();
  const todayStr = today_kst();
  const day = now.getDay();
  // 이번 주 토/일 계산
  const satDate = new Date(now); satDate.setDate(now.getDate() + (day===0 ? -1 : day===6 ? 0 : 6-day));
  const sunDate = new Date(satDate); sunDate.setDate(satDate.getDate() + (day===0 ? 0 : 1));
  const sat = fmtKST(satDate), sun = fmtKST(sunDate);

  if(mode==="evening"){
    return {dateFrom:todayStr, dateTo:todayStr, timeFrom:"17:00", label:"오늘 저녁", sub:`${todayStr.slice(5).replace("-","/")}(${DOW_KO[now.getDay()]}) · 17시 이후 상영작`};
  } else if(mode==="today"){
    return {dateFrom:todayStr, dateTo:todayStr, timeFrom:"00:00", label:"오늘", sub:`${todayStr.slice(5).replace("-","/")}(${DOW_KO[now.getDay()]}) · 전체 상영작`};
  } else if(mode==="tomorrow"){
    const t=new Date(now); t.setDate(t.getDate()+1);
    const s=fmtKST(t);
    return {dateFrom:s, dateTo:s, timeFrom:"00:00", label:"내일", sub:`${s.slice(5).replace("-","/")}(${DOW_KO[t.getDay()]}) · 전체 상영작`};
  } else if(mode==="saturday"){
    return {dateFrom:sat, dateTo:sat, timeFrom:"00:00", label:"토요일", sub:`${sat.slice(5).replace("-","/")}(토) · 토요일 상영작`};
  } else if(mode==="sunday"){
    return {dateFrom:sun, dateTo:sun, timeFrom:"00:00", label:"일요일", sub:`${sun.slice(5).replace("-","/")}(일) · 일요일 상영작`};
  } else { // weekend
    return {dateFrom:sat, dateTo:sun, timeFrom:"00:00", label:"주말", sub:`${sat.slice(5).replace("-","/")}~${sun.slice(5).replace("-","/")} · 주말 상영작`};
  }
}

function renderQuickCards(){
  const groups = {};
  quickData.forEach(r=>{
    const key = r.movie+"|"+r.cinema+"|"+(r.screen||"");
    if(!groups[key]){
      groups[key]={...r, times:[], start_dt: r.start_dt};
    } else if((r.start_dt||"") < groups[key].start_dt){
      groups[key].start_dt = r.start_dt; // 가장 빠른 시작 시간 기준
    }
    groups[key].times.push({start:(r.start_dt||"").slice(11,16), end:(r.end_dt||"").slice(11,16), program:r.program, show_type:r.show_type, start_dt:r.start_dt});
  });

  // times 시간순 정렬
  Object.values(groups).forEach(g=>{
    g.times.sort((a,b)=>a.start_dt.localeCompare(b.start_dt));
  });

  const cards = Object.values(groups);
  if(!cards.length){ document.getElementById("quick-content").innerHTML=`<div class="empty">상영 정보가 없습니다</div>`; return; }

  // 정렬
  if(quickSort === "time"){
    cards.sort((a,b)=>(a.start_dt||"").localeCompare(b.start_dt||"") * (quickSortDir==="asc"?1:-1));
  } else {
    cards.sort((a,b)=>(a.movie||"").localeCompare(b.movie||"","ko") * (quickSortDir==="asc"?1:-1));
  }

  // 제목 최대 글자수로 카드 고정폭 계산 (한글 1글자 ≈ 13px, 포스터60 + 패딩24 + 여유)
  const maxLen = Math.max(...cards.map(g=>(g.movie||"").length));
  const cardW = Math.max(200, Math.min(320, 60 + 24 + maxLen * 13));
  const grid = document.getElementById("quick-content");

  const isFree = c => FREE_CINEMAS.includes(c);

  const html = `<div class="quick-grid">${cards.map(g=>{
    const posterHtml = g.poster_url
      ? `<img src="${esc(g.poster_url)}" alt="" loading="lazy" onerror="this.parentNode.textContent='🎬'">`
      : "🎬";
    const venueHtml = g.screen
      ? `<div class="venue-dot${isFree(g.cinema)?" free":""}"></div><span>${esc(g.cinema)}</span><span class="venue-sep">·</span><span>${esc(g.screen)}</span>`
      : `<div class="venue-dot${isFree(g.cinema)?" free":""}"></div><span>${esc(g.cinema)}</span>`;
    const timesHtml = g.times.map(t=>{
      const s = stickerHtml(t.program, t.show_type);
      return `<div class="time-chip">${t.start}<span class="time-dash">-</span>${t.end}${s}</div>`;
    }).join("");
    // 주말/토/일 모드: 날짜+요일 표시
    const {mmdd, dow, dowIdx} = splitDt(g.start_dt);
    const dateHtml = ["weekend","saturday","sunday"].includes(quickMode)
      ? `<div class="qc-date">${mmdd} ${renderDowBadge(dow, dowIdx)}</div>` : "";
    const titleHtml = g.movie_url
      ? `<a href="${esc(g.movie_url)}" target="_blank" onclick="event.stopPropagation()">${esc(g.movie)}</a>`
      : esc(g.movie);
    const key = esc(g.movie)+"|"+esc(g.cinema)+"|"+esc(g.screen||"");
    return `<div class="quick-card" onclick="openPopup('${esc(g.movie)}','${esc(g.cinema)}','${esc(g.screen||"")}','${esc(g.movie_url||"")}')">
      <div class="qc-poster">${posterHtml}</div>
      <div class="qc-body">
        <div class="qc-title">${titleHtml}</div>
        ${dateHtml}
        <div class="qc-venue">${venueHtml}</div>
        <div class="qc-times">${timesHtml}</div>
      </div>
    </div>`;
  }).join("")}</div>`;
  grid.innerHTML=html;
  // 모든 카드 동일 고정폭 적용
  grid.querySelector(".quick-grid").style.gridTemplateColumns=`repeat(auto-fill, ${cardW}px)`;
}

const MOVIE_PAGE = 10;
let movieShowCount = MOVIE_PAGE;

function renderMovieGrid(resetCount=true){
  if(!movieData.length){ document.getElementById("movie-grid-content").innerHTML=`<div class="empty">상영 정보가 없습니다</div>`; return; }
  if(resetCount) movieShowCount = MOVIE_PAGE;
  const groups={};
  movieData.forEach(r=>{
    if(!groups[r.movie]) groups[r.movie]=[];
    groups[r.movie].push(r);
  });
  let titles=Object.keys(groups).filter(t=>!movieSearchQ||t.includes(movieSearchQ));
  // 정렬 (방향 포함)
  const dir = movieSortDir === "asc" ? 1 : -1;
  if(movieSortMode==="count")   titles.sort((a,b)=>(groups[a].length - groups[b].length) * dir);
  else if(movieSortMode==="title") titles.sort((a,b)=>a.localeCompare(b,"ko") * dir);
  else if(movieSortMode==="runtime") titles.sort((a,b)=>{
    const ra=groups[a].find(r=>r.runtime)?.runtime||0;
    const rb=groups[b].find(r=>r.runtime)?.runtime||0;
    return (ra - rb) * dir;
  });
  if(!titles.length){ document.getElementById("movie-grid-content").innerHTML=`<div class="empty">검색 결과가 없습니다</div>`; return; }
  const recSet=new Set((recData||[]).map(r=>r.title));
  const visible = titles.slice(0, movieShowCount);
  const remaining = titles.length - visible.length;
  const html=visible.map(title=>{
    const rows=groups[title];
    const runtime=rows.find(r=>r.runtime)?.runtime;
    const isRec=recSet.has(title);
    const thumb = rows[0].poster_url
      ? `<img data-src="${esc(rows[0].poster_url)}" alt="" class="lazy-img" onerror="this.parentNode.textContent='🎬'">`
      : "🎬";
    const recBadge = isRec ? `<span class="rec-badge">★ 추천</span>` : "";
    return `<div class="movie-group">
      <div class="movie-group-header" onclick="toggleMovieRows(this)">
        <div class="movie-thumb">${thumb}</div>
        <div class="movie-group-info">
          <div class="movie-group-title" style="display:flex;align-items:center;gap:6px;">${esc(title)}${recBadge}</div>
          <div class="movie-group-meta">${runtime?runtime+"분 · ":""}${rows.length}회 상영</div>
        </div>
        <span class="movie-group-count" style="display:none">${rows.length}회</span>
      </div>
      <div class="movie-rows">
        ${rows.map(r=>{
          const {mmdd,time,dow,dowIdx}=splitDt(r.start_dt);
          const {time:endTime}=splitDt(r.end_dt);
          const isFree=FREE_CINEMAS.includes(r.cinema);
          const s=stickerHtml(r.program,r.show_type);
          return `<div class="m-row">
            <div class="m-cinema-cell">
              <span class="m-cinema">${esc(r.cinema)}</span>
              ${r.screen?`<span class="m-screen">${esc(r.screen)}</span>`:""}
              ${isFree?`<span class="m-free">무료</span>`:""}
            </div>
            <span class="m-date">${mmdd} ${dow}</span>
            <span class="m-time">${time}–${endTime}${s}</span>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }).join("");
  const moreBtn = remaining > 0
    ? `<div style="grid-column:1/-1;text-align:center;padding:10px 0;">
        <button onclick="loadMoreMovies()" style="font-family:inherit;font-size:13px;font-weight:600;padding:9px 28px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;">
          더보기 (${remaining}편 더)
        </button>
       </div>`
    : "";
  document.getElementById("movie-grid-content").innerHTML=`${html}${moreBtn}`;
  lazyLoadImages();
}

function loadMoreMovies(){
  movieShowCount += MOVIE_PAGE;
  renderMovieGrid(false);
  lazyLoadImages();
}

// 뷰포트 진입 시 포스터 로드
function lazyLoadImages(){
  const imgs = document.querySelectorAll("img.lazy-img[data-src]");
  if("IntersectionObserver" in window){
    const obs = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          const img = e.target;
          img.src = img.dataset.src;
          img.removeAttribute("data-src");
          img.classList.remove("lazy-img");
          obs.unobserve(img);
        }
      });
    },{rootMargin:"100px"});
    imgs.forEach(img=>obs.observe(img));
  } else {
    // 폴백: 그냥 다 로드
    imgs.forEach(img=>{ img.src=img.dataset.src; img.removeAttribute("data-src"); });
  }
}

async function loadRecTab(){
  const el = document.getElementById("rec-content");
  el.innerHTML = `<div class="loading"><div class="spinner"></div>로딩 중…</div>`;
  try{
    const [recs, screenings] = await Promise.all([
      fetch("/api/recommended").then(r=>r.json()),
      movieData.length ? Promise.resolve(movieData)
        : fetch(`/api/screenings?date_from=${today_kst()}&date_to=${statsCache?.date_max||today_kst()}`).then(r=>r.json())
    ]);
    if(!movieData.length) movieData = screenings;

    if(!recs.length){
      el.innerHTML = `<div class="rec-empty"><div class="rec-empty-icon">🎬</div><p>아직 추천 영화가 없어요</p></div>`;
      return;
    }

    const groups = {};
    movieData.forEach(r=>{ if(!groups[r.movie]) groups[r.movie]=[]; groups[r.movie].push(r); });

    el.innerHTML = `<div class="rec-grid">${recs.map(rec=>{
      const rows = groups[rec.title] || [];
      const posterUrl = rows[0]?.poster_url || "";
      const posterHtml = posterUrl
        ? `<img src="${esc(posterUrl)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='🎬'">`
        : "🎬";
      const countText = rows.length ? `▶ ${rows.length}회 상영 중` : "현재 상영 정보 없음";

      // 수상 내역 파싱: "2025 칸|황금종려상 수상, 2024 아카데미|각본상 후보"
      const awardPairs = (rec.awards||"").split(",")
        .map(a=>a.trim()).filter(Boolean)
        .map(a=>{ const [fest,...rest]=a.split(":"); return {fest:fest.trim(), detail:(rest.join(":")||"").trim()}; });
      const MAX_AWARDS = 3;
      const visibleAwards = awardPairs.slice(0, MAX_AWARDS);
      const hiddenCount = awardPairs.length - visibleAwards.length;
      const awardsHtml = awardPairs.length
        ? `<div class="rec-awards">${
            visibleAwards.map(p=>`<span class="rec-award-row">
              <span class="rec-award-fest">${esc(p.fest)}</span
              ><span class="rec-award-detail">${esc(p.detail)}</span>
            </span>`).join("")
          }${hiddenCount > 0 ? `<span class="rec-award-more">+${hiddenCount}개</span>` : ""}
        </div>`
        : "";

      const descHtml = (rec.description||"").trim()
        ? `<div class="rec-desc">${esc(rec.description)}</div>`
        : "";

      return `<div class="rec-card" onclick="goToMovieTab('${esc(rec.title)}')">
        <div class="rec-poster">${posterHtml}</div>
        <div class="rec-body">
          <div class="rec-title">${esc(rec.title)}</div>
          ${descHtml}
          ${awardsHtml}
          <div class="rec-count">${countText}</div>
        </div>
      </div>`;
    }).join("")}</div>`;
  } catch(e){
    el.innerHTML = `<div class="rec-empty">추천 정보를 불러오지 못했습니다</div>`;
  }
}

async function goToMovieTab(title){
  // 영화별 탭으로 이동 + 해당 영화 검색 + 자동 펼침
  await switchTab("movie");
  // 검색창에 제목 입력
  const input = document.getElementById("movieSearchInput");
  if(input){ input.value = title; movieSearchQ = title; }
  // 정렬 초기화 (제목순으로 찾기 쉽게)
  movieSortMode = "count";
  document.querySelectorAll(".movie-sort-btn").forEach(b=>b.classList.toggle("active", b.dataset.sort==="count"));
  renderMovieGrid();
  // 해당 영화 그룹 자동 펼침 (렌더 후 약간 딜레이)
  setTimeout(()=>{
    const headers = document.querySelectorAll(".movie-group-header");
    headers.forEach(h=>{
      if(h.querySelector(".movie-group-title")?.textContent?.includes(title)){
        const rows = h.nextElementSibling;
        if(rows && !rows.classList.contains("open")) rows.classList.add("open");
        h.scrollIntoView({behavior:"smooth", block:"center"});
      }
    });
  }, 100);
}

function initDetailCinemaChips(){
  fetch("/api/cinemas").then(r=>r.json()).then(names=>{
    const ordered=[...CINEMA_ORDER.filter(c=>names.includes(c)),...names.filter(c=>!CINEMA_ORDER.includes(c))];
    document.getElementById("detail-cinema-chips").innerHTML=ordered.map(n=>{
      const loc = CINEMA_LOC[n] ? `<span class="chip-loc">${esc(CINEMA_LOC[n])}</span>` : "";
      const free = FREE_CINEMAS.includes(n) ? `<span class="chip-free">무료</span>` : "";
      return `<span class="detail-chip" data-val="${esc(n)}" onclick="toggleDetailChip(this)">${esc(n)}${loc}${free}</span>`;
    }).join("");
  }).catch(()=>{});
}

function toggleDetailChip(el){ el.classList.toggle("off"); }

function getDetailSelectedCinemas(){
  return [...document.querySelectorAll("#detail-cinema-chips .detail-chip:not(.off)")].map(el=>el.dataset.val);
}

function initDetailDates(){
  const today=today_kst();
  document.getElementById("dateFrom").value=today;
  if(statsCache?.date_max) document.getElementById("dateTo").value=statsCache.date_max;
  else document.getElementById("dateTo").value=today;
}

function setDetailDate(type, btn){
  const now=new Date(); now.setHours(0,0,0,0);
  let from,to;
  if(type==="today"){ from=to=fmtKST(now); }
  else if(type==="tomorrow"){ const t=new Date(now); t.setDate(t.getDate()+1); from=to=fmtKST(t); }
  else if(type==="week"){ const t=new Date(now); t.setDate(t.getDate()+6); from=fmtKST(now); to=fmtKST(t); }
  else if(type==="weekend"){
    const day=now.getDay();
    if(day===0){ from=to=fmtKST(now); }
    else if(day===6){ const s=new Date(now); s.setDate(now.getDate()+1); from=fmtKST(now); to=fmtKST(s); }
    else{ const sv=new Date(now); sv.setDate(now.getDate()+(6-day)); const su=new Date(sv); su.setDate(sv.getDate()+1); from=fmtKST(sv); to=fmtKST(su); }
  }
  document.getElementById("dateFrom").value=from;
  document.getElementById("dateTo").value=to;
  document.querySelectorAll(".shortcut").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

async function loadDetailScreenings(){
  const from=document.getElementById("dateFrom").value;
  const to=document.getElementById("dateTo").value;
  const movie=document.getElementById("movieSearch").value;
  const cinemas=getDetailSelectedCinemas();
  const tf=document.getElementById("timeFrom").value||"00:00";
  const tt=document.getElementById("timeTo").value||"23:59";
  trackSearch(movie, cinemas, 0);
  document.getElementById("detail-content").innerHTML=`<div class="loading"><div class="spinner"></div>조회 중…</div>`;
  const params=new URLSearchParams({date_from:from, date_to:to, movie});
  cinemas.forEach(c=>params.append("cinema",c));
  try{
    const raw=await fetch(`/api/screenings?${params}`).then(r=>r.json());
    detailData=raw.filter(r=>{ const t=(r.start_dt||"").slice(11,16); return !t||t>=tf&&t<=tt; });
    document.getElementById("resultCount").innerHTML=`<strong>${detailData.length.toLocaleString()}</strong>건 조회됨`;
    renderDetailView();
    trackSearch(movie, cinemas, detailData.length);
  }catch(e){
    document.getElementById("detail-content").innerHTML=`<div class="empty">데이터를 불러오지 못했습니다</div>`;
  }
}

function setDetailView(v){
  detailView=v;
  ["table","cards","cinema","date"].forEach(id=>{
    document.getElementById("vbtn-"+id).classList.toggle("active",id===v);
  });
  renderDetailView();
}

function renderDetailView(){
  if(!detailData.length){ document.getElementById("detail-content").innerHTML=`<div class="empty">조회 결과가 없습니다</div>`; return; }
  if(detailView==="table") renderDetailTable();
  else if(detailView==="cards") renderDetailCards();
  else if(detailView==="cinema") renderDetailCinemaGroup();
  else if(detailView==="date") renderDetailDateGroup();
}

function sort(col){
  if(sortCol===col) sortDir*=-1; else{ sortCol=col; sortDir=1; }
  renderDetailTable();
}
function resetSort(){ sortCol="start_dt"; sortDir=1; renderDetailTable(); }

function renderDetailTable(){
  const sorted=[...detailData].sort((a,b)=>{
    const av=a[sortCol]??"", bv=b[sortCol]??"";
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  const html=`<div class="table-wrap"><table>
    <thead><tr>
      <th data-sort="cinema" onclick="sort('cinema')" class="${sortCol==='cinema'?(sortDir===1?'sort-asc':'sort-desc'):''}">극장</th>
      <th data-sort="start_dt" onclick="sort('start_dt')" class="${sortCol==='start_dt'?(sortDir===1?'sort-asc':'sort-desc'):''}">날짜</th>
      <th>시작 – 종료</th>
      <th data-sort="movie" onclick="sort('movie')" class="${sortCol==='movie'?(sortDir===1?'sort-asc':'sort-desc'):''}">영화명</th>
      <th class="sort-reset-th"><button class="sort-reset-btn" onclick="resetSort()">정렬 초기화</button></th>
    </tr></thead>
    <tbody>${sorted.map(r=>{
      const {mmdd,time,dow,dowIdx}=splitDt(r.start_dt);
      const {time:endTime}=splitDt(r.end_dt);
      const s=stickerHtml(r.program,r.show_type);
      return `<tr>
        <td><span class="dt-cinema">${esc(r.cinema)}</span>${r.screen?`<span class="dt-screen">${esc(r.screen)}</span>`:""}</td>
        <td><span class="dt-date">${mmdd}</span>${renderDowBadge(dow,dowIdx)}</td>
        <td><span class="dt-time">${time} – ${endTime}${s}</span></td>
        <td>${r.movie_url?`<a class="movie-link" href="${esc(r.movie_url)}" target="_blank">${esc(r.movie)}</a>`:`<span style="font-weight:600">${esc(r.movie)}</span>`}</td>
        <td></td>
      </tr>`;
    }).join("")}</tbody>
  </table></div>`;
  document.getElementById("detail-content").innerHTML=html;
}

function renderDetailCards(){
  const html=`<div class="cards-grid">${detailData.map(r=>{
    const {mmdd,time,dow,dowIdx}=splitDt(r.start_dt);
    const {time:endTime}=splitDt(r.end_dt);
    const s=stickerHtml(r.program,r.show_type);
    return `<div class="card">
      <div class="card-title">${r.movie_url?`<a class="movie-link" href="${esc(r.movie_url)}" target="_blank">${esc(r.movie)}</a>`:esc(r.movie)}</div>
      <div class="card-time">${mmdd} ${renderDowBadge(dow,dowIdx)} ${time} – ${endTime}${s}</div>
      <div class="card-cinema-row">
        <a class="card-cinema-badge" href="/cinema/${encodeURIComponent(r.cinema)}" onclick="trackCinemaClick('${esc(r.cinema)}')">${esc(r.cinema)}</a>
        ${r.screen?`<span class="screen-tag">${esc(r.screen)}</span>`:""}
      </div>
    </div>`;
  }).join("")}</div>`;
  document.getElementById("detail-content").innerHTML=html;
}

function renderDetailCinemaGroup(){
  const groups={};
  detailData.forEach(r=>{ if(!groups[r.cinema]) groups[r.cinema]=[]; groups[r.cinema].push(r); });
  const ordered=[...CINEMA_ORDER.filter(c=>groups[c]),...Object.keys(groups).filter(c=>!CINEMA_ORDER.includes(c))];
  const html=ordered.map(cinema=>{
    const rows=groups[cinema];
    return `<div class="cinema-group" style="margin-bottom:10px;">
      <div class="cinema-group-header">
        <div class="cinema-group-name">${esc(cinema)}</div>
        <div class="cinema-group-meta"><span>${rows.length}건</span></div>
      </div>
      <div class="cinema-group-rows">${rows.map(r=>{
        const {mmdd,time,dow,dowIdx}=splitDt(r.start_dt);
        const {time:endTime}=splitDt(r.end_dt);
        const s=stickerHtml(r.program,r.show_type);
        return `<div class="c-row">
          <span class="c-date">${mmdd} ${DOW_KO[dowIdx]}</span>
          <span class="c-time">${time}–${endTime}</span>
          <span class="c-movie">${r.movie_url?`<a href="${esc(r.movie_url)}" target="_blank">${esc(r.movie)}</a>`:esc(r.movie)}${s}</span>
        </div>`;
      }).join("")}</div>
    </div>`;
  }).join("");
  document.getElementById("detail-content").innerHTML=html;
}

function renderDetailDateGroup(){
  const groups={};
  detailData.forEach(r=>{ const d=(r.start_dt||"").slice(0,10); if(!groups[d]) groups[d]=[]; groups[d].push(r); });
  const html=Object.keys(groups).sort().map(date=>{
    const rows=groups[date];
    const d=new Date(date+"T00:00:00");
    const dow=DOW_KO[d.getDay()], dowIdx=d.getDay();
    return `<div style="margin-bottom:10px;">
      <div style="font-weight:700;font-size:13px;padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;display:flex;align-items:center;gap:8px;">
        ${date.slice(5).replace("-","/")} ${renderDowBadge(dow,dowIdx)}
        <span style="font-size:12px;font-weight:400;color:var(--text-muted);">${rows.length}건</span>
      </div>
      <div style="border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);background:var(--surface);">
        ${rows.map(r=>{
          const {time}=splitDt(r.start_dt);
          const {time:endTime}=splitDt(r.end_dt);
          const s=stickerHtml(r.program,r.show_type);
          return `<div style="display:grid;grid-template-columns:auto 110px 1fr;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px;align-items:center;">
            <span style="font-weight:700;">${esc(r.cinema)}${r.screen?` <span style="color:var(--text-muted);font-weight:400;">${esc(r.screen)}</span>`:""}</span>
            <span style="font-weight:600;">${time} – ${endTime}${s}</span>
            <span style="font-weight:600;">${r.movie_url?`<a class="movie-link" href="${esc(r.movie_url)}" target="_blank">${esc(r.movie)}</a>`:esc(r.movie)}</span>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }).join("");
  document.getElementById("detail-content").innerHTML=html;
}

function resetDetailFilters(){
  document.getElementById("movieSearch").value="";
  document.getElementById("timeFrom").value="00:00";
  document.getElementById("timeTo").value="23:59";
  document.querySelectorAll(".detail-chip").forEach(el=>el.classList.remove("off"));
  document.querySelectorAll(".shortcut").forEach(b=>b.classList.remove("active"));
  initDetailDates();
  document.getElementById("detail-content").innerHTML=`<div class="empty">조건을 설정하고 조회 버튼을 눌러주세요</div>`;
  document.getElementById("resultCount").innerHTML="";
}

function exportExcel(){
  const from=document.getElementById("dateFrom").value;
  const to=document.getElementById("dateTo").value;
  const movie=document.getElementById("movieSearch").value;
  const cinemas=getDetailSelectedCinemas();
  const params=new URLSearchParams({date_from:from, date_to:to, movie});
  cinemas.forEach(c=>params.append("cinema",c));
  window.location.href=`/api/export/excel?${params}`;
}

async function refreshData(){
  const btn=document.getElementById("refreshBtn");
  btn.textContent="↻ 갱신 중…";
  await loadStats();
  await loadQuickData();
  if(document.getElementById("tab-cinema").style.display!=="none") { cinemaData=[]; await loadCinemaTabData(); }
  if(document.getElementById("tab-movie").style.display!=="none")  { movieData=[];  await loadMovieTabData(); }
  btn.textContent="↻ 새로고침";
}

window.addEventListener("scroll",()=>{
  const b=document.getElementById("scrollTopBtn");
  if(b) b.classList.toggle("visible",window.scrollY>200);
});

init();
</script>
